<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #2c2c2e;
      --hdr:     #232324;
      --sep:     #3a3a3c;
      --text:    #f5f5f7;
      --muted:   #98989f;
      --accent:  #f5f5f7;
      --mono:    ui-monospace, 'SF Mono', 'Consolas', 'Monaco', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--hdr);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: baseline;
      gap: 10px 14px;
      flex-wrap: wrap;
      padding: 14px 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Outer ── */
    .outer {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* ── Status ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }
    #status.error { color: #f87171; }

    /* ── Section header ── */
    .section-hdr {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 7px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Clusters ── */
    #clusters-wrap { margin-bottom: 4px; }

    .cluster-entry {
      padding: 8px 0;
      border-bottom: 1px solid rgba(58,58,60,0.5);
      cursor: pointer;
      transition: background 0.08s;
      user-select: none;
    }
    .cluster-entry:hover  { background: rgba(255,255,255,0.025); }
    .cluster-entry.active { background: rgba(255,255,255,0.04); }

    .cl-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .cl-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .cluster-entry:hover .cl-name,
    .cluster-entry.active .cl-name { color: var(--text); }

    .cl-score {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .cl-layers { margin-top: 3px; }
    .cl-layer {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      opacity: 0.75;
    }
    .cluster-entry:hover .cl-layer,
    .cluster-entry.active .cl-layer { opacity: 1; }

    .cl-factors {
      margin-top: 2px;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.45;
      letter-spacing: 0.02em;
    }
    .cluster-entry:hover .cl-factors,
    .cluster-entry.active .cl-factors { opacity: 0.75; }

    /* ── Month header ── */
    .month-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 0 5px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Feed item — compact log line ── */
    .item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(58,58,60,0.6);
      cursor: default;
      transition: background 0.08s;
    }

    .item:hover             { background: rgba(255,255,255,0.025); }
    .item.tint-amber        { background: rgba(245,158,11,0.10); }
    .item.tint-red          { background: rgba(239,68,68,0.13); }
    .item.tint-amber:hover  { background: rgba(245,158,11,0.15); }
    .item.tint-red:hover    { background: rgba(239,68,68,0.18); }

    .row1 {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .item-desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .item-val.val-billion { color: #4ade80; }

    .row2 {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
      font-size: 11px;
      color: var(--muted);
    }

    .item-country { color: var(--muted); font-weight: 600; cursor: pointer; }
    .item-country:hover, .item-country.active-filter { color: var(--text); }

    .sep { color: var(--sep); user-select: none; }

    .details-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      user-select: none;
    }
    .details-row:hover { opacity: 1; }

    .details-btn { cursor: pointer; }
    .details-btn:hover { text-decoration: underline; }

    .details-body {
      display: none;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.7;
      line-height: 1.5;
    }
    .item.expanded .details-body { display: block; }
    .item.expanded .details-row  { opacity: 1; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1c1c1e;
      border: 1px solid var(--sep);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      max-width: 300px;
      pointer-events: none;
      z-index: 100;
    }

    .tt-score     { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .tt-rationale { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>HARPY</h1>
    <span id="updated"></span>
  </header>
  <div class="outer">
    <div id="status">fetching signals…</div>
    <div id="clusters-wrap" style="display:none">
      <div class="section-hdr">clusters · top 5 · structural × lift × convergence</div>
      <div id="clusters"></div>
    </div>
    <div id="feed-section">
      <div id="feed"></div>
    </div>
  </div>
  <div id="tooltip"></div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Source labels / short names ──────────────────────────────────────────

    const SOURCE_LABELS = {
      dsca: 'Defense Security Cooperation Agency',
      sam:  'System for Award Management',
      fara: 'Foreign Agents Registration Act',
      ofac: 'Office of Foreign Assets Control',
      lda:  'Lobbying Disclosure Act',
      federalregister: 'Federal Register',
    };

    const SOURCE_SHORT = {
      dsca: 'DSCA',
      sam:  'SAM',
      fara: 'FARA',
      ofac: 'OFAC',
      lda:  'LDA',
      federalregister: 'FR',
    };

    function sourceLabel(s) {
      return SOURCE_LABELS[s && s.toLowerCase()] || (s || '').toUpperCase();
    }

    function sourceShort(s) {
      return SOURCE_SHORT[s && s.toLowerCase()] || (s || '').toUpperCase().slice(0, 5);
    }

    // ── Date helpers ─────────────────────────────────────────────────────────

    // Returns YYYY-MM-DD for N days ago (local time)
    function isoOffset(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) { const n = v / 1e9; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B'; }
      if (v >= 1e6) { const n = v / 1e6; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M'; }
      if (v >= 1e3) { const n = v / 1e3; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K'; }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtDateShort(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Tooltip ──────────────────────────────────────────────────────────────

    const tooltipEl = document.getElementById('tooltip');

    document.addEventListener('mouseover', e => {
      const target = e.target.closest('[data-tooltip]');
      if (!target) { tooltipEl.style.display = 'none'; return; }
      const [line1, ...rest] = target.dataset.tooltip.split('\n');
      tooltipEl.innerHTML =
        `<div class="tt-score">${esc(line1)}</div>` +
        rest.map(l => `<div class="tt-rationale">${esc(l)}</div>`).join('');
      tooltipEl.style.display = 'block';
    });

    document.addEventListener('mouseout', e => {
      if (e.target.closest('[data-tooltip]')) tooltipEl.style.display = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (tooltipEl.style.display !== 'block') return;
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltipEl.style.left = Math.min(x, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
      tooltipEl.style.top  = Math.min(y, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
    });

    // ── Layer definitions ────────────────────────────────────────────────────

    // Maps signal source → semantic layer name.
    // FARA and LDA both count as one "influence" layer — 40 LDA filings = 1 layer,
    // same as 1 FARA filing. Convergence counts channels, not volume.
    const LAYER_MAP = {
      dsca:            'military',
      fara:            'influence',
      lda:             'influence',
      federalregister: 'regulatory',
      sam:             'procurement',
    };

    function sigLayer(sig) {
      return LAYER_MAP[(sig.source || '').toLowerCase()] || null;
    }

    // ── Cluster computation ──────────────────────────────────────────────────

    function computeClusters(signals) {
      // Eight cutoffs: today, -14, -28, -42, -56, -70, -84, -98 days
      // cutoffs[i] = isoOffset(i * 14)
      // Recent window:     signal_date >= cutoffs[1]
      // Baseline period p: cutoffs[p+2] <= signal_date < cutoffs[p+1]  (p = 0..5)
      const cutoffs = [0, 14, 28, 42, 56, 70, 84, 98].map(d => isoOffset(d));

      // Group all signals by ISO
      const byIso = new Map();
      for (const sig of signals) {
        if (!sig.iso) continue;
        if (!byIso.has(sig.iso)) byIso.set(sig.iso, []);
        byIso.get(sig.iso).push(sig);
      }

      const clusters = [];

      for (const [iso, sigs] of byIso) {
        const profile         = profileCache[iso] || null;
        const structuralScore = profile ? (profile.structural_interest_score || 1) : 1;

        // ── Recent window (14d): collect signals per layer ──────────────────
        const layerSigs = { military: [], influence: [], regulatory: [], procurement: [] };
        for (const sig of sigs) {
          if ((sig.signal_date || '') < cutoffs[1]) continue;
          const layer = sigLayer(sig);
          if (layer) layerSigs[layer].push(sig);
        }

        const recentLayers = Object.values(layerSigs).filter(a => a.length > 0).length;
        if (recentLayers === 0) continue;

        // ── Baseline: six 14d periods (days 15-98) — distinct layers per period ──
        // Stored as array for Z-score upgrade: when data matures, swap lift formula to
        //   lift = (recentLayers - baselineMean) / Math.max(baselineStd, 0.5)
        const periodCounts = [];
        for (let p = 0; p < 6; p++) {
          const pEnd   = cutoffs[p + 1];  // exclusive upper bound
          const pStart = cutoffs[p + 2];  // inclusive lower bound
          const layers = new Set();
          for (const sig of sigs) {
            const d = sig.signal_date || '';
            if (d >= pStart && d < pEnd) {
              const layer = sigLayer(sig);
              if (layer) layers.add(layer);
            }
          }
          periodCounts.push(layers.size);
        }

        const hasBaseline   = periodCounts.some(c => c > 0);
        const baselineMean  = periodCounts.reduce((a, b) => a + b, 0) / 6;
        const baselineVar   = periodCounts.reduce((a, b) => a + (b - baselineMean) ** 2, 0) / 6;
        const baselineStd   = Math.sqrt(baselineVar);  // stored for Z-score upgrade path

        // Current lift: ratio. Default 1.0 if no 90d history exists yet.
        const lift = hasBaseline ? recentLayers / Math.max(baselineMean, 0.5) : 1.0;

        // ── Recency weight: median signal date within the convergence window ──
        // Split 0-14d into 0-7d (1.0) and 7-14d (0.7) — flat 1.0 would have no
        // discriminating power since all convergence-window signals are ≤14d old.
        const windowDates = Object.values(layerSigs).flat()
          .map(s => s.signal_date).filter(Boolean).sort();
        const medianDate    = windowDates[Math.floor(windowDates.length / 2)] || null;
        const recencyWeight = !medianDate              ? 0.7
          : medianDate >= isoOffset(7)  ? 1.0
          : medianDate >= isoOffset(14) ? 0.7
          :                               0.5;

        const convergence = recentLayers;
        const score = Math.round(structuralScore * lift * convergence * recencyWeight * 100) / 100;

        // ── Weekly layer counts (6 weeks) — stored for future CUSUM upgrade ──
        // weeks[0] = 0-7d, weeks[1] = 7-14d, ..., weeks[5] = 35-42d
        // CUSUM would track consecutive weeks above baselineMean to boost persistent spikes.
        const weeklyLayerCounts = [];
        for (let w = 0; w < 6; w++) {
          const wStart = isoOffset((w + 1) * 7);
          const wEnd   = isoOffset(w * 7);
          const wLayers = new Set();
          for (const sig of sigs) {
            const d = sig.signal_date || '';
            if (d >= wStart && d <= wEnd) {
              const layer = sigLayer(sig);
              if (layer) wLayers.add(layer);
            }
          }
          weeklyLayerCounts.push(wLayers.size);
        }

        clusters.push({
          iso,
          structuralScore,
          lift:            Math.round(lift * 100) / 100,
          convergence,
          recencyWeight,
          score,
          layerSigs,
          medianDate,
          baselineStats:   { mean: Math.round(baselineMean * 100) / 100, std: Math.round(baselineStd * 100) / 100, periods: periodCounts },
          weeklyLayerCounts,
        });
      }

      clusters.sort((a, b) => b.score - a.score);
      const top5 = clusters.slice(0, 5);

      // ── Console diagnostic — sanity-check component values ──────────────
      console.table(top5.map(cl => ({
        iso:          cl.iso,
        structural:   cl.structuralScore,
        lift:         cl.lift,
        convergence:  cl.convergence,
        recency:      cl.recencyWeight,
        score:        cl.score,
        b_mean:       cl.baselineStats.mean,
        median_date:  cl.medianDate,
        weeks:        cl.weeklyLayerCounts.join(','),
      })));

      return top5;
    }

    // ── Layer line synthesis ─────────────────────────────────────────────────

    // Produces one human-readable line per firing layer.
    // Uses the most-recent signal in that layer's 14d window for the summary.
    function synthesizeLayerLine(layer, sigs) {
      if (!sigs.length) return null;
      const sorted = [...sigs].sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));
      const top    = sorted[0];
      const date   = fmtDateShort(top.signal_date);
      const extra  = sigs.length > 1 ? ' +' + (sigs.length - 1) : '';

      if (layer === 'military') {
        const val       = top.value_usd ? fmtValue(top.value_usd) + ' ' : '';
        const titleRaw  = top.title || '';
        // DSCA titles are often "Country \u2014 Weapon System" — strip the country prefix
        const titleClean = titleRaw.includes(' \u2014 ')
          ? titleRaw.split(' \u2014 ').slice(1).join(' \u2014 ')
          : titleRaw;
        const title = titleClean.length > 45 ? titleClean.slice(0, 42) + '\u2026' : titleClean;
        return `Military: ${val}${title} ${date}${extra}`;
      }

      if (layer === 'influence') {
        const faraCount = sigs.filter(s => (s.source || '').toLowerCase() === 'fara').length;
        const ldaCount  = sigs.filter(s => (s.source || '').toLowerCase() === 'lda').length;
        const parts = [];
        if (faraCount) parts.push(faraCount + ' FARA');
        if (ldaCount)  parts.push(ldaCount + ' LDA');
        return 'Influence: ' + parts.join(', ') + ' \u2014 last ' + date;
      }

      if (layer === 'regulatory') {
        const titleRaw = top.title || '';
        const title    = titleRaw.length > 50 ? titleRaw.slice(0, 47) + '\u2026' : titleRaw;
        return `Regulatory: ${title} ${date}${extra}`;
      }

      if (layer === 'procurement') {
        const val      = top.value_usd ? fmtValue(top.value_usd) + ' ' : '';
        const titleRaw = top.title || '';
        const title    = titleRaw.length > 45 ? titleRaw.slice(0, 42) + '\u2026' : titleRaw;
        return `Procurement: ${val}${title} ${date}${extra}`;
      }

      return layer + ': ' + sigs.length + ' signal' + (sigs.length !== 1 ? 's' : '') + ' \u2014 last ' + date;
    }

    // ── Render clusters ──────────────────────────────────────────────────────

    let activeFilter = null;

    function renderClusters(clusters, signals) {
      const wrap      = document.getElementById('clusters-wrap');
      const container = document.getElementById('clusters');
      if (!clusters.length) return;

      wrap.style.display = '';
      container.innerHTML = '';

      // clusters is already sliced to top 5 in computeClusters
      for (const cl of clusters) {
        const profile = profileCache[cl.iso] || null;
        const name    = (profile ? profile.name : cl.iso).toUpperCase();

        const entry = document.createElement('div');
        entry.className = 'cluster-entry';
        entry.dataset.iso = cl.iso;

        // Header: country name + score
        const scoreFmt = cl.score >= 10 ? cl.score.toFixed(0) : cl.score.toFixed(1);
        let html = `<div class="cl-header">` +
          `<span class="cl-name">${esc(name)}</span>` +
          `<span class="cl-score">${esc(scoreFmt)}</span>` +
          `</div>`;

        // One line per firing layer, in fixed order
        const layerOrder = ['military', 'influence', 'regulatory', 'procurement'];
        const layerLines = layerOrder
          .map(l => synthesizeLayerLine(l, cl.layerSigs[l]))
          .filter(Boolean);
        if (layerLines.length) {
          html += `<div class="cl-layers">` +
            layerLines.map(l => `<div class="cl-layer">${esc(l)}</div>`).join('') +
            `</div>`;
        }

        // Top 3 structural interest factors from profile
        const factors = profile && profile.key_structural_interests;
        if (factors && factors.length) {
          html += `<div class="cl-factors">${esc(factors.slice(0, 3).join(' \xb7 '))}</div>`;
        }

        entry.innerHTML = html;

        entry.addEventListener('click', () => {
          if (activeFilter === cl.iso) {
            activeFilter = null;
            entry.classList.remove('active');
          } else {
            container.querySelectorAll('.cluster-entry.active')
              .forEach(r => r.classList.remove('active'));
            activeFilter = cl.iso;
            entry.classList.add('active');
          }
          renderFeed(signals);
        });

        container.appendChild(entry);
      }
    }

    // ── Render feed ──────────────────────────────────────────────────────────

    function renderFeed(signals) {
      const feedEl = document.getElementById('feed');
      feedEl.innerHTML = '';

      const visible = activeFilter
        ? signals.filter(s => s.iso === activeFilter)
        : signals;

      if (!visible.length) {
        feedEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      const byMonth = new Map();
      for (const sig of visible) {
        const key = sig.signal_date ? sig.signal_date.slice(0, 7) : '';
        if (!byMonth.has(key)) byMonth.set(key, []);
        byMonth.get(key).push(sig);
      }

      for (const [monthKey, monthSigs] of byMonth) {
        const hdr = document.createElement('div');
        hdr.className = 'month-header';
        if (monthKey) {
          const [y, m] = monthKey.split('-').map(Number);
          hdr.textContent = new Date(y, m - 1, 1)
            .toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            .toUpperCase();
        }
        feedEl.appendChild(hdr);
        for (const sig of monthSigs) {
          feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null, signals));
        }
      }
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile, signals) {
      const country = profile ? profile.name : sig.iso;
      const score   = profile ? profile.structural_interest_score : null;

      const el = document.createElement('div');
      el.className = 'item';

      if (score != null) {
        if      (score >= 7) el.classList.add('tint-red');
        else if (score >= 4) el.classList.add('tint-amber');
      }

      let countryTooltip = '';
      if (profile) {
        const ttParts = [];
        if (score != null) ttParts.push(`Structural interest: ${score}/10`);
        if (profile.score_rationale) ttParts.push(profile.score_rationale);
        if (ttParts.length) countryTooltip = ` data-tooltip="${esc(ttParts.join('\n'))}"`;
      }

      const sourceUrl  = sig.page_url || sig.url || null;
      const descRaw    = sig.description || '';
      const descTrunc  = descRaw.length > 800 ? descRaw.slice(0, 800) + '\u2026' : descRaw;
      const srcShort   = sourceShort(sig.source);

      const sourceBtn  = sourceUrl
        ? `<a class="details-btn" href="${esc(sourceUrl)}" target="_blank" rel="noopener">${esc(srcShort)}</a>`
        : `<span>${esc(srcShort)}</span>`;
      const detailsBtn  = descTrunc ? `<span class="details-btn details-expand">details</span>` : '';
      const detailsPipe = detailsBtn ? `<span class="sep">·</span>` : '';

      const detailsHtml = (descTrunc || sourceUrl)
        ? `<div class="details-row">${sourceBtn}${detailsPipe}${detailsBtn}</div>` +
          (descTrunc ? `<div class="details-body">${esc(descTrunc)}</div>` : '')
        : '';

      const valHtml = sig.value_usd != null
        ? `<span class="item-val${sig.value_usd >= 1e9 ? ' val-billion' : ''}">${esc(fmtValue(sig.value_usd))}</span>`
        : '';

      const isFiltered = activeFilter === sig.iso;
      const countryClass = 'item-country' + (isFiltered ? ' active-filter' : '');

      el.innerHTML =
        `<div class="row1">` +
          `<span class="item-desc">${esc(sig.title || sig.description || '—')}</span>` +
          valHtml +
        `</div>` +
        `<div class="row2">` +
          `<span class="${countryClass}"${countryTooltip}>${esc(country)}</span>` +
          `<span class="sep">·</span>` +
          `<span>${esc(fmtDate(sig.signal_date))}</span>` +
        `</div>` +
        detailsHtml;

      const expand = el.querySelector('.details-expand');
      if (expand) {
        expand.addEventListener('click', e => {
          e.stopPropagation();
          const wasExpanded = el.classList.contains('expanded');
          document.querySelectorAll('.item.expanded').forEach(i => i.classList.remove('expanded'));
          if (!wasExpanded) el.classList.add('expanded');
        });
      }

      if (sig.iso) {
        el.querySelector('.item-country').addEventListener('click', e => {
          e.stopPropagation();
          if (activeFilter === sig.iso) {
            activeFilter = null;
          } else {
            activeFilter = sig.iso;
          }
          // Sync cluster bar active state
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
          if (activeFilter) {
            const clRow = document.querySelector(`.cluster-entry[data-iso="${activeFilter}"]`);
            if (clRow) clRow.classList.add('active');
          }
          renderFeed(signals);
        });
      }

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe, skip US/null iso, filter to 2025+, sort newest first
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.iso && s.iso !== 'US')
        .filter(s => (s.signal_date || '') >= '2025-01-01')
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        document.getElementById('feed').innerHTML =
          '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      // Load all profiles in parallel
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      const clusters = computeClusters(signals);
      renderClusters(clusters, signals);
      renderFeed(signals);
    }

    main();
  </script>
</body>
</html>
