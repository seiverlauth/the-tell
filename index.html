<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #363639;
      --hdr:     #232324;
      --sep:     #3a3a3c;
      --text:    #f5f5f7;
      --muted:   #98989f;
      --accent:  #f5f5f7;
      --mono:    ui-monospace, 'SF Mono', 'Consolas', 'Monaco', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--hdr);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: baseline;
      gap: 10px 14px;
      flex-wrap: wrap;
      padding: 14px 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Outer ── */
    .outer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* ── Status ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }
    #status.error { color: var(--muted); }

    /* ── Section header ── */
    .section-hdr {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 7px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Top row: map + clusters side by side ── */
    .top-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      align-items: flex-start;
    }

    /* ── Map ── */
    #map {
      flex: 0 0 55%;
      height: 100%;
      min-height: 280px;
      background: var(--bg);
    }
    .leaflet-container { background: var(--bg) !important; }
    .leaflet-attribution-flag { display: none !important; }
    .leaflet-overlay-pane svg { shape-rendering: crispEdges; }

    /* ── Clusters ── */
    #clusters-wrap {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .cluster-entry {
      padding: 10px 0;
      border-bottom: 1px solid rgba(58,58,60,0.5);
      cursor: pointer;
      transition: background 0.08s;
      user-select: none;
    }
    .cluster-entry:hover  { background: rgba(255,255,255,0.025); }
    .cluster-entry.active { background: rgba(255,255,255,0.04); }

    .cl-header { display: flex; align-items: baseline; gap: 8px; }
    .cl-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    .cl-layers { margin-top: 4px; }
    .cl-layer {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .cluster-entry:hover .cl-layer,
    .cluster-entry.active .cl-layer { color: var(--text); }

    .cl-factors {
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.02em;
    }
    .cluster-entry:hover .cl-factors,
    .cluster-entry.active .cl-factors { opacity: 0.8; }

    /* ── Zone labels ── */
    .zone-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0 5px;
      border-bottom: 1px solid var(--sep);
    }
    .zone-label.zone-sep { padding-top: 20px; }
    .zone-label { display: flex; align-items: center; gap: 5px; }
    .zone-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      border: 1px solid var(--muted); color: var(--muted);
      font-size: 9px; font-weight: 700; letter-spacing: 0;
      text-transform: none; cursor: default; flex-shrink: 0;
      position: relative;
    }
    .zone-tip:hover::after {
      content: attr(data-tip);
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      background: #1a1a2a; border: 1px solid var(--sep);
      color: var(--text); font-size: 11px; font-weight: 400;
      letter-spacing: 0; text-transform: none;
      padding: 7px 10px; width: 220px; line-height: 1.5;
      white-space: normal; z-index: 9999; pointer-events: none;
    }
    .zone-empty {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.4;
      padding: 8px 0 10px;
      border-bottom: 1px solid rgba(58,58,60,0.5);
    }

    /* ── Notable signal entries ── */
    .nt-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
    .nt-value { margin-left: auto; font-size: 11px; color: var(--text); white-space: nowrap; }
    .nt-title { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
    .cluster-entry:hover .nt-title,
    .cluster-entry.active .nt-title { color: var(--text); }

    /* ── Month header ── */
    .month-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 0 5px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Feed item — single Finder-style row ── */
    .item {
      border-bottom: 1px solid rgba(58,58,60,0.4);
    }
    .item:hover { background: rgba(255,255,255,0.02); }

    .item-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      gap: 0;
      min-width: 0;
      white-space: nowrap;
      cursor: pointer;
    }

    .item-country {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
    }
    .item-country:hover,
    .item-country.active-filter { color: var(--text); }

    .item-country-unresolved {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.45;
      flex-shrink: 0;
      cursor: default;
      font-style: italic;
    }

    .item-sep { color: var(--sep); user-select: none; padding: 0 5px; flex-shrink: 0; }

    .item-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-size: 12px;
      padding-right: 16px;
    }

    .item-src {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
      padding-right: 12px;
      opacity: 0.65;
    }

    .item-date {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
      padding-right: 10px;
      min-width: 80px;
      text-align: right;
    }

    .item-detail {
      display: none;
      padding: 2px 0 8px 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.55;
      white-space: normal;
    }
    .item.expanded .item-detail { display: block; }
    .item.expanded .item-src { color: var(--layer-color); opacity: 1; }
    .item-detail a {
      color: var(--accent);
    }
    .item-detail a:hover { text-decoration: underline; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1c1c1e;
      border: 1px solid var(--sep);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      max-width: 300px;
      pointer-events: none;
      z-index: 9999;
    }

    .tt-score     { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .tt-rationale { color: var(--muted); }

    #feed-toggle-btn:hover { opacity: 1 !important; }

    /* ── Filter bar ── */
    #filter-bar {
      padding: 8px 0 6px;
      border-bottom: 1px solid var(--sep);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .filter-pill {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 1px 6px;
      border: 1px solid var(--sep);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      background: transparent;
      font-family: var(--mono);
    }
    .filter-pill:hover { color: var(--text); border-color: var(--muted); }
    .filter-pill.active {
      color: var(--pill-color, var(--text));
      border-color: var(--pill-color, var(--text));
    }
    .filter-pill.active:hover {
      color: var(--pill-color, var(--text));
      border-color: var(--pill-color, var(--text));
    }

    .filter-vsep {
      width: 1px;
      height: 12px;
      background: var(--sep);
      flex-shrink: 0;
      margin: 0 3px;
    }

    .filter-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
      flex-shrink: 0;
      padding-right: 1px;
    }

    .filter-count {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.03em;
      white-space: nowrap;
      cursor: default;
    }

    /* ── Narratives panel ── */
    #narratives-section { margin-top: 16px; }

    .theme-entry {
      padding: 8px 0;
      border-bottom: 1px solid rgba(58,58,60,0.4);
      cursor: pointer;
      user-select: none;
      transition: background 0.08s;
    }
    .theme-entry:hover  { background: rgba(255,255,255,0.02); }
    .theme-entry.active { background: rgba(255,255,255,0.04); }

    .th-header { display: flex; align-items: baseline; gap: 8px; }

    .th-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding: 1px 4px;
      border: 1px solid currentColor;
    }

    .th-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .th-score {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .th-why {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.4;
    }
    .theme-entry:hover .th-why,
    .theme-entry.active .th-why { color: var(--text); }

    /* ── z-score badge (velocity_anomaly themes) ── */
    .th-z-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      padding: 0 4px;
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    /* ── Scrollable narratives list ── */
    .theme-entries-scroll {
      max-height: 280px;
      overflow-y: auto;
    }
    .theme-entries-scroll::-webkit-scrollbar { width: 4px; }
    .theme-entries-scroll::-webkit-scrollbar-thumb { background: var(--sep); }
  </style>
</head>
<body>
  <header>
    <h1>HARPY</h1>
    <span id="updated"></span>
  </header>
  <div class="outer">
    <div id="status">fetching signals…</div>
    <div class="top-row">
      <div id="map" style="display:none"></div>
      <div id="clusters-wrap" style="display:none">
        <div id="clusters"></div>
      </div>
    </div>
    <div id="narratives-section" style="display:none"></div>
    <div id="feed-section">
      <div id="feed-hdr" class="section-hdr" style="display:none">
        <span id="feed-label"></span>
        <span id="feed-toggle-btn" style="cursor:pointer;margin-left:8px;text-transform:none;font-size:10px;opacity:0.6"></span>
      </div>
      <div id="filter-bar" style="display:none"></div>
      <div id="feed"></div>
    </div>
  </div>
  <div id="tooltip"></div>

  <script>
    const SIGNALS_URL = 'data/signals.json';

    // ── Source labels / short names ──────────────────────────────────────────

    // Layer colors — used only when a country filter is active (feed badges go grey otherwise).
    // Palette avoids red and yellow families: those belong to the map zone colors.
    const LAYER_COLORS = {
      military:    '#3b82f6',  // blue
      influence:   '#10b981',  // emerald
      regulatory:  '#a855f7',  // purple
      procurement: '#06b6d4',  // cyan
      financial:   '#f97316',  // orange
      legislative: '#94a3b8',  // slate
      adversarial: '#ec4899',  // rose  (red reserved for map convergence zone)
    };

    function layerColor(layer) {
      return LAYER_COLORS[layer] || '#a0a0b0';
    }

    // Theme type palette — distinct from layer colors and map zone colors
    const THEME_TYPE_COLORS = {
      actor_concentration: '#c084fc',  // violet
      velocity_anomaly:    '#f87171',  // rose-pink
      layer_sequence:      '#2dd4bf',  // teal
      cftc_overlap:        '#fbbf24',  // amber
    };
    const THEME_TYPE_LABELS = {
      actor_concentration: 'ACTOR',
      velocity_anomaly:    'VELOCITY',
      layer_sequence:      'SEQUENCE',
      cftc_overlap:        'CFTC',
    };

    const SOURCE_LABELS = {
      dsca:           'Defense Security Cooperation Agency',
      sam:            'System for Award Management',
      fara:           'Foreign Agents Registration Act',
      ofac:           'Office of Foreign Assets Control',
      lda:            'Lobbying Disclosure Act',
      federalregister:'Federal Register',
      anchor_budget:  'Elbit Systems — SEC EDGAR 6-K',
    };

    const SOURCE_SHORT = {
      dsca:           'DSCA',
      sam:            'SAM',
      fara:           'FARA',
      ofac:           'OFAC',
      lda:            'LDA',
      federalregister:'FR',
      anchor_budget:  'Elbit/EDGAR',
    };

    function sourceLabel(s) {
      return SOURCE_LABELS[s && s.toLowerCase()] || (s || '').toUpperCase();
    }

    function sourceShort(s) {
      return SOURCE_SHORT[s && s.toLowerCase()] || (s || '').toUpperCase().slice(0, 5);
    }

    // ── Date helpers ─────────────────────────────────────────────────────────

    // Returns YYYY-MM-DD for N days ago (local time)
    function isoOffset(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) { const n = v / 1e9; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B'; }
      if (v >= 1e6) { const n = v / 1e6; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M'; }
      if (v >= 1e3) { const n = v / 1e3; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K'; }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtDateShort(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── ISO → profile map (built from embedded signal profiles at load time) ──
    // Keyed by ISO alpha-2. Populated in main() from sig.profile on each signal.
    let isoProfile = {};

    // ── Tooltip ──────────────────────────────────────────────────────────────

    const tooltipEl = document.getElementById('tooltip');

    document.addEventListener('mouseover', e => {
      if (e.target.closest('#map')) return;  // map manages its own tooltip
      const target = e.target.closest('[data-tooltip]');
      if (!target) { tooltipEl.style.display = 'none'; return; }
      const [line1, ...rest] = target.dataset.tooltip.split('\n');
      tooltipEl.innerHTML =
        `<div class="tt-score">${esc(line1)}</div>` +
        rest.map(l => `<div class="tt-rationale">${esc(l)}</div>`).join('');
      tooltipEl.style.display = 'block';
    });

    document.addEventListener('mouseout', e => {
      if (e.target.closest('#map')) return;  // map manages its own tooltip
      if (e.target.closest('[data-tooltip]')) tooltipEl.style.display = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (tooltipEl.style.display !== 'block') return;
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltipEl.style.left = Math.min(x, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
      tooltipEl.style.top  = Math.min(y, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
    });

    // ── Recency decay for notable signal scoring ────────────────────────────
    // 0–7 days → 1.0, 8–14 days → 0.8, 15–30 days → 0.5, beyond → 0.
    function recencyDecay(signalDate) {
      if (!signalDate) return 0;
      const ageDays = Math.round((Date.now() - new Date(signalDate).getTime()) / 86400000);
      if (ageDays <=  7) return 1.0;
      if (ageDays <= 14) return 0.8;
      if (ageDays <= 30) return 0.5;
      return 0;
    }


    // ── Zone 2: Notable signal computation ───────────────────────────────────
    // Scores each individual signal in the last 30 days:
    //   score = quality × dollar_mod × log2(structuralScore + 1) × recencyDecay
    // quality and dollar_mod are precomputed by build_signals.py.
    // One entry per country (best signal per ISO). Top 5 returned.

    function computeNotableSignals(signals) {
      const w30 = isoOffset(30);

      // Score every signal in the 30-day window
      const scored = [];
      for (const sig of signals) {
        if (!sig.iso || sig.iso === 'XX') continue;
        if ((sig.signal_date || '') < w30) continue;
        const decay = recencyDecay(sig.signal_date);
        if (!decay) continue;
        const quality = sig.quality || 0;
        if (quality < 0.7) continue;  // Zone 2 minimum: DSCA(1.0), FARA(0.9), FR-policy(0.8), SAM(0.7)
        // LDA(0.5) excluded — standalone lobbying disclosure is not a standalone signal.
        // Exception path (FARA-equivalent foreign govt LDA) not yet detectable from data.
        const structScore = sig.profile ? (sig.profile.score || 1) : 1;
        const score = quality * (sig.dollar_mod || 1) * Math.log2(structScore + 1) * decay;
        scored.push({ sig, score: Math.round(score * 10000) / 10000, structScore });
      }

      // Best signal per ISO
      const bestByIso = new Map();
      for (const entry of scored) {
        const iso = entry.sig.iso;
        if (!bestByIso.has(iso) || entry.score > bestByIso.get(iso).score) {
          bestByIso.set(iso, entry);
        }
      }

      const top5 = [...bestByIso.values()]
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      console.log('=== ZONE 2 — NOTABLE SIGNALS ===');
      console.table(top5.map((e, i) => ({
        rank:        i + 1,
        iso:         e.sig.iso,
        score:       e.score,
        source:      e.sig.source,
        quality:     e.sig.quality,
        dollar_mod:  Math.round((e.sig.dollar_mod || 1) * 1000) / 1000,
        log2_struct: Math.round(Math.log2(e.structScore + 1) * 1000) / 1000,
        decay:       recencyDecay(e.sig.signal_date),
        date:        e.sig.signal_date,
        title:       (e.sig.title || '').slice(0, 55),
      })));

      return top5;
    }

    // ── Signal identity key ──────────────────────────────────────────────────
    // Stable, deterministic key for locating a specific signal's feed item.
    function sigKey(sig) {
      return (sig.source || '') + '|' + (sig.signal_date || '') + '|' + (sig.title || '').slice(0, 60);
    }

    // ── Render notable signals ───────────────────────────────────────────────

    let activeFilter = null;
    let themeFilter  = null;  // Set<string> of ISOs when a narrative theme is active
    let activeTheme  = null;  // theme object currently selected

    // ── Feed filter state ────────────────────────────────────────────────────
    let showUnresolved  = false;
    const ALL_FEED_LAYERS = ['military','influence','regulatory','procurement','financial'];
    const LAYER_SRC_MAP   = {
      military:    [['dsca','DSCA'],['anchor_budget','ELBIT']],
      influence:   [['fara','FARA'],['lda','LDA']],
      regulatory:  [['federalregister','FR'],['ofac','OFAC'],['bis','BIS']],
      procurement: [['sam','SAM']],
      financial:   [['imf','IMF'],['cftc','CFTC']],
    };
    let activeFeedLayers = new Set(ALL_FEED_LAYERS);
    let activeFeedSrcs   = new Set(Object.values(LAYER_SRC_MAP).flat().map(([src]) => src));
    let minProfileScore  = 0;

    function renderNotable(notable, signals) {
      const wrap      = document.getElementById('clusters-wrap');
      const container = document.getElementById('clusters');

      if (!notable.length) return;
      wrap.style.display = '';
      container.innerHTML = '';

      // ── Notable Signals ───────────────────────────────────────────────────
      const z2Label = document.createElement('div');
      z2Label.className = 'zone-label';
      z2Label.innerHTML = 'NOTABLE SIGNALS <span class="zone-tip" data-tip="The highest-quality individual signals from the last 30 days, one per country.">?</span>';
      container.appendChild(z2Label);

      for (const { sig, structScore } of notable) {
        const profile = sig.profile || null;
        const name    = (profile ? profile.name : sig.iso).toUpperCase();

        // Clean title: strip leading "Country — " from DSCA records
        const raw = sig.title || '';
        const src = (sig.source || '').toLowerCase();
        let title = (src === 'dsca' && raw.includes('\u2014'))
          ? raw.split('\u2014').slice(1).join('\u2014').trim()
          : raw;
        if (title.length > 55) title = title.slice(0, 52) + '\u2026';

        const color  = layerColor(sig.layer);
        const badge  = sourceShort(sig.source);
        const valStr = sig.value_usd ? fmtValue(sig.value_usd) : '';

        const entry = document.createElement('div');
        entry.className = 'cluster-entry';
        entry.dataset.iso = sig.iso;

        let html = `<div class="cl-header">`;
        html += `<span class="cl-name">${esc(name)}</span>`;
        html += `<span class="nt-badge" style="color:${color}">${esc(badge)}</span>`;
        if (valStr) html += `<span class="nt-value">${esc(valStr)}</span>`;
        html += `</div>`;
        html += `<div class="nt-title">${esc(title)}</div>`;

        entry.innerHTML = html;
        // Zone 2: filter by country AND scroll to + expand the specific signal row
        entry.addEventListener('click', () => {
          themeFilter = null; activeTheme = null;
          document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
          if (activeFilter === sig.iso) {
            activeFilter = null;
            entry.classList.remove('active');
          } else {
            container.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
            activeFilter = sig.iso;
            entry.classList.add('active');
          }
          syncMapFilter(activeFilter);
          renderFeed(signals);
          if (activeFilter === sig.iso) {
            const key = sigKey(sig);
            const allItems = document.querySelectorAll('.item[data-sig-key]');
            for (const feedItem of allItems) {
              if (feedItem.dataset.sigKey === key) {
                feedItem.classList.add('expanded');
                break;
              }
            }
          }
        });
        container.appendChild(entry);
      }
    }

    // ── Feed filter application ──────────────────────────────────────────────

    function applyFeedFilters(sigs) {
      return sigs.filter(sig => {
        if (activeFilter && sig.iso !== activeFilter) return false;
        if (themeFilter && themeFilter.size > 0 && !themeFilter.has(sig.iso)) return false;
        if (sig.iso === 'XX' && !showUnresolved) return false;
        if (sig.layer && !activeFeedLayers.has(sig.layer)) return false;
        if (!activeFeedSrcs.has(sig.source)) return false;
        if (minProfileScore > 0) {
          const score = sig.profile ? (sig.profile.score || 0) : 0;
          if (score < minProfileScore) return false;
        }
        return true;
      });
    }

    // ── Filter bar initialisation ────────────────────────────────────────────

    function initFilterBar(signals) {
      const bar = document.getElementById('filter-bar');
      bar.style.display = '';

      // ── Row 1: unresolved · layers · score ──────────────────────────────
      const row1 = document.createElement('div');
      row1.className = 'filter-row';

      const layerLabel = document.createElement('span');
      layerLabel.className = 'filter-label';
      layerLabel.textContent = 'layer';
      row1.appendChild(layerLabel);

      for (const layer of ALL_FEED_LAYERS) {
        const color = layerColor(layer);
        const pill = document.createElement('span');
        pill.className = 'filter-pill active';
        pill.dataset.layer = layer;
        pill.style.setProperty('--pill-color', color);
        pill.textContent = layer.toUpperCase();
        pill.addEventListener('click', () => {
          const on = activeFeedLayers.has(layer);
          if (on) { activeFeedLayers.delete(layer); pill.classList.remove('active'); }
          else    { activeFeedLayers.add(layer);    pill.classList.add('active'); }
          // Sync source pills for this layer
          bar.querySelectorAll(`.src-pill[data-layer="${layer}"]`).forEach(sp => {
            const src = sp.dataset.src;
            if (on) { activeFeedSrcs.delete(src); sp.classList.remove('active'); }
            else    { activeFeedSrcs.add(src);    sp.classList.add('active'); }
          });
          renderFeed(signals);
        });
        row1.appendChild(pill);
      }

      const sep2 = document.createElement('span'); sep2.className = 'filter-vsep';
      row1.appendChild(sep2);

      const scoreLabel = document.createElement('span');
      scoreLabel.className = 'filter-label';
      scoreLabel.textContent = 'score';
      row1.appendChild(scoreLabel);

      for (const [label, val] of [['ALL',0],['4+',4],['6+',6],['8+',8]]) {
        const pill = document.createElement('span');
        pill.className = 'filter-pill score-pill' + (val === 0 ? ' active' : '');
        pill.dataset.score = val;
        pill.textContent = label;
        pill.addEventListener('click', () => {
          minProfileScore = val;
          bar.querySelectorAll('.score-pill').forEach(sp =>
            sp.classList.toggle('active', +sp.dataset.score === val)
          );
          renderFeed(signals);
        });
        row1.appendChild(pill);
      }

      // Theme filter indicator — shown when a narrative theme is active
      const themeIndicator = document.createElement('span');
      themeIndicator.id = 'theme-filter-indicator';
      themeIndicator.className = 'filter-pill';
      themeIndicator.style.display = 'none';
      themeIndicator.addEventListener('click', () => {
        themeFilter = null; activeTheme = null; activeFilter = null;
        document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
        syncMapFilter(null);
        renderFeed(signals);
      });
      row1.appendChild(themeIndicator);

      const countEl = document.createElement('span');
      countEl.className = 'filter-count';
      countEl.id = 'filter-count';
      countEl.title = 'show unresolved country records';
      countEl.addEventListener('click', () => {
        showUnresolved = !showUnresolved;
        renderFeed(signals);
      });
      row1.appendChild(countEl);

      bar.appendChild(row1);

      // ── Row 2: sources grouped by layer ─────────────────────────────────
      const row2 = document.createElement('div');
      row2.className = 'filter-row';

      let first = true;
      for (const [layer, srcs] of Object.entries(LAYER_SRC_MAP)) {
        if (!first) {
          const sep = document.createElement('span'); sep.className = 'filter-vsep';
          row2.appendChild(sep);
        }
        first = false;
        for (const [src, label] of srcs) {
          const color = layerColor(layer);
          const pill = document.createElement('span');
          pill.className = 'filter-pill src-pill active';
          pill.dataset.src = src;
          pill.dataset.layer = layer;
          pill.style.setProperty('--pill-color', color);
          pill.textContent = label;
          pill.addEventListener('click', () => {
            const on = activeFeedSrcs.has(src);
            if (on) { activeFeedSrcs.delete(src); pill.classList.remove('active'); }
            else    { activeFeedSrcs.add(src);    pill.classList.add('active'); }
            renderFeed(signals);
          });
          row2.appendChild(pill);
        }
      }

      bar.appendChild(row2);
    }

    // ── Render feed ──────────────────────────────────────────────────────────

    function renderFeed(signals) {
      const feedEl    = document.getElementById('feed');
      const feedHdr   = document.getElementById('feed-hdr');
      const feedLabel = document.getElementById('feed-label');
      const toggleBtn = document.getElementById('feed-toggle-btn');
      feedEl.innerHTML = '';

      if (activeFilter || themeFilter) {
        feedHdr.style.display = '';
        if (activeFilter) {
          const p = isoProfile[activeFilter];
          feedLabel.textContent = p ? p.name : activeFilter;
        } else if (activeTheme) {
          const t = activeTheme.title;
          feedLabel.textContent = t.length > 60 ? t.slice(0, 57) + '\u2026' : t;
        }
        toggleBtn.textContent = '[clear filter]';
        toggleBtn.onclick = () => {
          activeFilter = null;
          themeFilter  = null;
          activeTheme  = null;
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
          document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
          syncMapFilter(null);
          renderFeed(signals);
        };
      } else {
        feedHdr.style.display = 'none';
      }

      // Sync theme filter indicator in filter bar
      const themeIndicator = document.getElementById('theme-filter-indicator');
      if (themeIndicator) {
        if (activeTheme) {
          const label = activeTheme.title.length > 38 ? activeTheme.title.slice(0, 35) + '\u2026' : activeTheme.title;
          themeIndicator.textContent = '\u00d7 ' + label;
          themeIndicator.style.setProperty('--pill-color', THEME_TYPE_COLORS[activeTheme.type] || '#a0a0b0');
          themeIndicator.classList.add('active');
          themeIndicator.style.display = '';
        } else {
          themeIndicator.classList.remove('active');
          themeIndicator.style.display = 'none';
        }
      }

      const visible = applyFeedFilters(signals);
      const countEl = document.getElementById('filter-count');
      if (countEl) countEl.textContent = visible.length + '\u00a0signals' + (showUnresolved ? '\u00a0\xb7XX' : '');

      if (!visible.length) {
        feedEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      const byMonth = new Map();
      for (const sig of visible) {
        const key = sig.signal_date ? sig.signal_date.slice(0, 7) : '';
        if (!byMonth.has(key)) byMonth.set(key, []);
        byMonth.get(key).push(sig);
      }

      for (const [monthKey, monthSigs] of byMonth) {
        const hdr = document.createElement('div');
        hdr.className = 'month-header';
        if (monthKey) {
          const [y, m] = monthKey.split('-').map(Number);
          hdr.textContent = new Date(y, m - 1, 1)
            .toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            .toUpperCase();
        }
        feedEl.appendChild(hdr);
        for (const sig of monthSigs) {
          feedEl.appendChild(renderItem(sig, signals));
        }
      }
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, signals) {
      const isUnresolved = sig.iso === 'XX';
      const profile = sig.profile || null;
      const country = profile ? profile.name : sig.iso;
      const el      = document.createElement('div');
      el.className  = 'item';
      el.dataset.sigKey = sigKey(sig);
      el.style.setProperty('--layer-color', layerColor(sig.layer));

      // Country tooltip with structural interest context
      let countryTooltip = '';
      if (isUnresolved) {
        countryTooltip = ` data-tooltip="Country not determined from filing — excluded from map and convergence scoring"`;
      } else if (profile) {
        const ttParts = [];
        const s = profile.score;
        if (s != null) ttParts.push(`Structural interest: ${s}/10`);
        if (profile.rationale) ttParts.push(profile.rationale);
        if (ttParts.length) countryTooltip = ` data-tooltip="${esc(ttParts.join('\n'))}"`;
      }

      const sourceUrl = sig.page_url || sig.url || null;
      const descRaw   = sig.description || '';
      const srcFull   = sourceLabel(sig.source);

      // Title: strip "Country — " prefix common in DSCA titles; append value if present
      let titleStr = sig.title || sig.description || '—';
      if (titleStr.includes(' \u2014 ')) {
        titleStr = titleStr.split(' \u2014 ').slice(1).join(' \u2014 ');
      }
      if (sig.value_usd != null) titleStr += '  ' + fmtValue(sig.value_usd);

      const hasDetail = !!(descRaw || sourceUrl);
      const isFiltered   = !isUnresolved && activeFilter === sig.iso;
      const countryClass = isUnresolved
        ? 'item-country-unresolved'
        : 'item-country' + (isFiltered ? ' active-filter' : '');
      const countryText  = isUnresolved ? 'unresolved' : esc(country);

      // Expanded detail: description + source link
      let detailInner = '';
      if (descRaw) {
        const trunc = descRaw.length > 800 ? descRaw.slice(0, 800) + '\u2026' : descRaw;
        detailInner += esc(trunc);
      }
      if (sourceUrl) {
        detailInner += (detailInner ? '  ' : '') +
          `<a href="${esc(sourceUrl)}" target="_blank" rel="noopener">source \u2197</a>`;
      }

      el.innerHTML =
        `<div class="item-row">` +
          `<span class="${countryClass}"${countryTooltip}>${countryText}</span>` +
          `<span class="item-sep">\xb7</span>` +
          `<span class="item-title">${esc(titleStr)}</span>` +
          `<span class="item-src">${esc(sourceShort(sig.source))}</span>` +
          `<span class="item-date">${esc(fmtDate(sig.signal_date))}</span>` +
        `</div>` +
        (hasDetail ? `<div class="item-detail">${detailInner}</div>` : '');

      if (hasDetail) {
        el.querySelector('.item-row').addEventListener('click', e => {
          if (e.target.classList.contains('item-country')) return;
          if (e.target.classList.contains('item-country-unresolved')) return;
          const wasExpanded = el.classList.contains('expanded');
          document.querySelectorAll('.item.expanded').forEach(i => i.classList.remove('expanded'));
          if (!wasExpanded) el.classList.add('expanded');
        });
      }

      if (sig.iso && !isUnresolved) {
        el.querySelector('.item-country').addEventListener('click', e => {
          e.stopPropagation();
          themeFilter = null; activeTheme = null;
          document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
          activeFilter = activeFilter === sig.iso ? null : sig.iso;
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
          if (activeFilter) {
            const clRow = document.querySelector(`.cluster-entry[data-iso="${activeFilter}"]`);
            if (clRow) clRow.classList.add('active');
          }
          syncMapFilter(activeFilter);
          renderFeed(signals);
        });
      }

      return el;
    }

    // ── Render narratives ────────────────────────────────────────────────────

    function renderNarratives(themes, signals) {
      const section = document.getElementById('narratives-section');
      if (!themes || !themes.length) return;

      section.innerHTML = '';
      section.style.display = '';

      const hdr = document.createElement('div');
      hdr.className = 'section-hdr';
      hdr.textContent = 'NARRATIVES';
      section.appendChild(hdr);

      // Scrollable container for theme entries
      const scrollWrap = document.createElement('div');
      scrollWrap.className = 'theme-entries-scroll';
      section.appendChild(scrollWrap);

      const maxScore = themes[0].score || 1;

      for (const theme of themes) {
        const entry = document.createElement('div');
        entry.className = 'theme-entry';

        const color = THEME_TYPE_COLORS[theme.type] || '#a0a0b0';
        const label = THEME_TYPE_LABELS[theme.type] || theme.type.toUpperCase().slice(0, 8);

        // 5-char score bar
        const filled = Math.max(1, Math.round((theme.score / maxScore) * 5));
        const bar    = '\u2588'.repeat(filled) + '\u2591'.repeat(5 - filled);

        // For velocity_anomaly: extract z-score from title "(+4.0σ)" and render as badge
        let titleText = theme.title;
        let zBadgeHtml = '';
        if (theme.type === 'velocity_anomaly') {
          const zMatch = theme.title.match(/\(([+-]?\d+\.?\d*)\u03c3\)/);
          if (zMatch) {
            zBadgeHtml = `<span class="th-z-badge" style="color:${esc(color)};border-color:${esc(color)}">${esc(zMatch[1])}\u03c3</span>`;
            titleText = theme.title.replace(/\s*\([+-]?\d+\.?\d*\u03c3\)/, '').trim();
          }
        }

        entry.innerHTML =
          `<div class="th-header">` +
            `<span class="th-badge" style="color:${esc(color)};border-color:${esc(color)}">${esc(label)}</span>` +
            (zBadgeHtml || '') +
            `<span class="th-title">${esc(titleText)}</span>` +
            `<span class="th-score">${esc(bar)} ${theme.score.toFixed(2)}</span>` +
          `</div>` +
          `<div class="th-why">${esc(theme.why)}</div>`;

        entry.addEventListener('click', () => {
          const wasActive = entry.classList.contains('active');
          document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));

          if (wasActive) {
            themeFilter = null;
            activeTheme = null;
            activeFilter = null;
            syncMapFilter(null);
          } else {
            entry.classList.add('active');
            const validIsos = (theme.countries || []).filter(iso => iso && iso !== 'XX' && iso !== 'US');
            activeTheme  = theme;
            activeFilter = null;

            if (theme.type === 'cftc_overlap') {
              // CFTC: theme.countries is already the overlap (basket ∩ active signals).
              // Filter feed to overlap only; highlight FULL basket on map.
              themeFilter = validIsos.length ? new Set(validIsos) : null;

              // Find the full basket from the CFTC signal for map highlighting
              const commodity = (theme.signal_keys && theme.signal_keys[0] || '').replace(/^cftc:/, '');
              const cftcSig   = signals.find(s => s.source === 'cftc' && s.commodity === commodity);
              const fullBasket = new Set(
                ((cftcSig && cftcSig.basket) || validIsos).filter(iso => iso && iso !== 'US')
              );
              syncMapFilter(null, fullBasket);
            } else {
              themeFilter = validIsos.length ? new Set(validIsos) : null;
              // Single-country: zoom map; multi-country: world view
              syncMapFilter(validIsos.length === 1 ? validIsos[0] : null);
            }
          }

          renderFeed(signals);
        });

        scrollWrap.appendChild(entry);
      }
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // signals.json is pre-filtered, deduped, and sorted by build_signals.py
      const signals = data.signals || [];

      statusEl.remove();

      if (!signals.length) {
        document.getElementById('feed').innerHTML =
          '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      // Build iso→profile map from embedded profiles (no HTTP fetches needed)
      for (const sig of signals) {
        if (sig.iso && sig.profile && !isoProfile[sig.iso]) {
          isoProfile[sig.iso] = sig.profile;
        }
      }

      const notable  = computeNotableSignals(signals);
      renderNotable(notable, signals);
      renderNarratives(data.themes || [], signals);
      initFilterBar(signals);
      renderFeed(signals);
      initMap(notable, signals, data.themes || []);
    }

    main();
  </script>

          let lng = ring[i][0], lat = ring[i][1];
          const prev = out[i - 1][0];
          while (lng - prev >  180) lng -= 360;
          while (lng - prev < -180) lng += 360;
          out.push([lng, lat]);
        }
        return out;
      }
      function unwrapGeometry(geom) {
        if (!geom) return geom;
        if (geom.type === 'Polygon') {
          return { ...geom, coordinates: geom.coordinates.map(unwrapRing) };
        }
        if (geom.type === 'MultiPolygon') {
          return { ...geom, coordinates: geom.coordinates.map(poly => poly.map(unwrapRing)) };
        }
        return geom;
      }
      const fixedCountries = {
        ...countries,
        features: countries.features.map(f => ({ ...f, geometry: unwrapGeometry(f.geometry) })),
      };

      // ── Match map height to cluster panel height ──────────────────────────
      const clustersWrap = document.getElementById('clusters-wrap');
      const panelH = clustersWrap.offsetHeight;
      if (panelH > 100) mapEl.style.height = panelH + 'px';

      if (leafletMap) { leafletMap.remove(); leafletMap = null; }

      leafletMap = L.map('map', {
        zoomControl: false, attributionControl: false,
        scrollWheelZoom: true,
      });

      // ── Map colors: gray → dark red spectrum keyed on narrative presence ──
      // Theme countries scale from dim red to full red by score.
      // Recent-signal countries (not in themes) get a subtle warm-gray lift.
      const BASE_COLOR       = '#3e3e3e';   // no recent activity
      const RECENT_COLOR     = '#4e3e3e';   // signal in last 30d, not in any theme
      const THEME_DIM_COLOR  = '#6b1a1a';   // in a theme, lower score
      const THEME_MID_COLOR  = '#8c2020';   // in a theme, mid score
      const THEME_HIGH_COLOR = '#b02828';   // in a theme, high score (≥20)
      const BASKET_COLOR     = '#3e4a3e';   // CFTC basket: muted green-gray, distinct from red
      const HOVER_COLOR      = '#b8b8b8';
      const ACTIVE_COLOR     = '#d43030';   // clicked country: bright red
      const BORDER_COLOR     = '#252525';

      const isoToLayer = new Map();

      function baseColorFor(iso) {
        const ts = themeScoreByIso.get(iso);
        if (ts != null) {
          if (ts >= 20) return THEME_HIGH_COLOR;
          if (ts >= 10) return THEME_MID_COLOR;
          return THEME_DIM_COLOR;
        }
        if (recentIsos.has(iso)) return RECENT_COLOR;
        return BASE_COLOR;
      }

      let hoveredIso = null;

      L.geoJSON(fixedCountries, {
        renderer: L.svg({ padding: 0.5 }),
        style: f => ({
          fillColor:   baseColorFor(ISO_NUM_TO_A2[+f.id]),
          fillOpacity: 1,
          color:       BORDER_COLOR,
          weight:      1.5,
        }),
        onEachFeature: (f, layer) => {
          const iso = ISO_NUM_TO_A2[+f.id];
          if (iso) isoToLayer.set(iso, layer);

          layer.on('mouseover', e => {
            hoveredIso = iso;
            layer.setStyle({ fillColor: HOVER_COLOR });
            const profile = iso ? (isoProfile[iso] || null) : null;
            const name = profile ? (profile.name || iso) : iso;
            let ttHtml = `<div class="tt-score">${esc(name)}</div>`;
            if (profile) {
              if (profile.score != null)
                ttHtml += `<div class="tt-rationale">${esc('Structural interest: ' + profile.score + '/10')}</div>`;
              if (profile.rationale)
                ttHtml += `<div class="tt-rationale">${esc(profile.rationale)}</div>`;
            }
            tooltipEl.innerHTML = ttHtml;
            tooltipEl.style.display = 'block';
            const me = e.originalEvent;
            tooltipEl.style.left = Math.min(me.clientX + 14, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
            tooltipEl.style.top  = Math.min(me.clientY + 14, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
          });

          layer.on('mousemove', e => {
            if (tooltipEl.style.display !== 'block') return;
            const me = e.originalEvent;
            tooltipEl.style.left = Math.min(me.clientX + 14, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
            tooltipEl.style.top  = Math.min(me.clientY + 14, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
          });

          layer.on('mouseout', () => {
            hoveredIso = null;
            layer.setStyle({ fillColor: baseColorFor(iso) });
            tooltipEl.style.display = 'none';
          });

          layer.on('click', () => {
            if (!iso) return;
            themeFilter = null; activeTheme = null;
            document.querySelectorAll('.theme-entry.active').forEach(r => r.classList.remove('active'));
            activeFilter = activeFilter === iso ? null : iso;
            document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
            if (activeFilter) {
              const clRow = document.querySelector(`.cluster-entry[data-iso="${activeFilter}"]`);
              if (clRow) clRow.classList.add('active');
            }
            syncMapFilter(activeFilter);
            renderFeed(signals);
          });
        },
      }).addTo(leafletMap);

      // zoom 1: world tile = 512px wide. Map column ≈ 530px, so the full 360°
      // of longitude fits with a small overhang — both eastern Russia (~170°E)
      // and western Alaska (~170°W) are within frame. fitBounds on a lat range
      // fights Mercator projection and always picks a zoom that shows Antarctica;
      // setView with an explicit zoom avoids that entirely.
      // Center [25, 10]: northern bias keeps Antarctica below the fold.
      leafletMap.invalidateSize();
      leafletMap.setView([25, 10], 1);

      // Expose map highlight + zoom so cluster/feed/theme clicks can sync the map.
      // basketHighlight (optional Set<ISO>) highlights CFTC basket countries without zooming.
      syncMapFilter = function(activeIso, basketHighlight) {
        for (const [layerIso, lyr] of isoToLayer) {
          const isActive = activeIso && layerIso === activeIso;
          const inBasket = basketHighlight && basketHighlight.has(layerIso);
          let color;
          if (isActive)    color = ACTIVE_COLOR;
          else if (inBasket) color = BASKET_COLOR;
          else             color = baseColorFor(layerIso);
          lyr.setStyle({ fillColor: color });
        }
        if (activeIso) {
          const lyr = isoToLayer.get(activeIso);
          if (lyr) leafletMap.fitBounds(lyr.getBounds(), { padding: [30, 30] });
        } else {
          leafletMap.invalidateSize();
          leafletMap.setView([25, 10], 1);
        }
      };
    }
  </script>
</body>
</html>
