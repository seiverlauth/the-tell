<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CREST</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    header span { font-size: 12px; color: #999; }

    #map-container { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { background: #fff !important; }

    /* ── Detail panel ── */
    #panel {
      position: absolute;
      top: 12px; right: -320px;
      width: 280px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 16px;
      transition: right 0.2s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #panel.open { right: 212px; }
    @media (max-width: 640px) {
      #panel.open { right: 12px; }
    }

    #panel-close {
      align-self: flex-end;
      background: none; border: none;
      font-size: 16px; color: #999;
      cursor: pointer; line-height: 1;
    }
    #panel-close:hover { color: #111; }

    #panel-country { font-size: 15px; font-weight: 600; }
    #panel-score-label { font-size: 11px; color: #999; margin-bottom: 2px; }
    #panel-score { font-size: 36px; font-weight: 700; line-height: 1; }

    #panel-score-bar { height: 3px; background: #eee; border-radius: 2px; }
    #panel-score-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }

    #panel-desc {
      font-size: 13px; line-height: 1.6; color: #666;
      border-top: 1px solid #eee; padding-top: 12px;
    }

    /* ── Rankings sidebar ── */
    #rankings {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 200px;
      background: #fff;
      border-left: 1px solid #e8e8e8;
      z-index: 900;
      display: flex;
      flex-direction: column;
    }

    #rankings-header {
      padding: 10px 12px;
      border-bottom: 1px solid #e8e8e8;
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #rankings-list {
      flex: 1;
      overflow-y: auto;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
    }
    .rank-row:hover { background: #fafafa; }

    .rank-num {
      font-size: 10px;
      color: #ccc;
      min-width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    .rank-swatch {
      width: 8px; height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .rank-name {
      flex: 1;
      font-size: 12px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-score {
      font-size: 11px;
      color: #999;
      min-width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Rankings toggle (small screens) ── */
    #rankings-toggle {
      display: none;
      position: absolute;
      top: 12px; right: 12px;
      z-index: 950;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    @media (max-width: 640px) {
      #rankings { display: none; }
      #rankings.visible { display: flex; width: 200px; }
      #rankings-toggle { display: block; }
    }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 20px; left: 16px;
      z-index: 1000;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 5px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    #legend-label { font-size: 10px; color: #999; }
    #legend-bar {
      width: 160px; height: 4px; border-radius: 2px;
      background: linear-gradient(to right, #e8edf2, #a8b8cc, #5878a0, #2a4a7a, #0a1628);
    }
    #legend-ticks {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #bbb; width: 160px;
    }

    #error-banner {
      display: none;
      position: absolute;
      top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      color: #888;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <h1>CREST</h1>
  <span>Conflict and Regional Event Signal Tracker</span>
  <span id="updated"></span>
</header>

<div id="map-container">
  <div id="map"></div>
  <div id="error-banner">Signal data unavailable — please refresh to try again.</div>

  <div id="panel">
    <button id="panel-close">&#x2715;</button>
    <div id="panel-country">—</div>
    <div>
      <div id="panel-score-label">Signal Intensity</div>
      <div id="panel-score">—</div>
    </div>
    <div id="panel-score-bar"><div id="panel-score-fill"></div></div>
    <div id="panel-desc">Select a country to view signal data.</div>
  </div>

  <div id="rankings">
    <div id="rankings-header">Signal Rank</div>
    <div id="rankings-list"></div>
  </div>

  <button id="rankings-toggle">Rankings</button>

  <div id="legend">
    <div id="legend-label">Signal Level</div>
    <div id="legend-bar"></div>
    <div id="legend-ticks">
      <span>Low</span>
      <span>Medium</span>
      <span>High</span>
    </div>
  </div>
</div>

<script>
  // ── Active scores: ISO alpha-2 → 0–100, populated from signals.json ────────
  let countryScores = {};

  // ── Color scale ───────────────────────────────────────────────────────────
  const colorScale = d3.scaleLinear()
    .domain([0, 25, 50, 75, 100])
    .range(['#e8edf2', '#a8b8cc', '#5878a0', '#2a4a7a', '#0a1628']);

  function scoreToColor(score) { return colorScale(score); }

  // ── ISO alpha-2 → display name ─────────────────────────────────────────────
  const ISO_A2_TO_NAME = {
    AF:'Afghanistan', AL:'Albania', DZ:'Algeria', AO:'Angola', AR:'Argentina',
    AM:'Armenia', AU:'Australia', AT:'Austria', AZ:'Azerbaijan', BD:'Bangladesh',
    BY:'Belarus', BE:'Belgium', BO:'Bolivia', BA:'Bosnia', BR:'Brazil',
    BG:'Bulgaria', KH:'Cambodia', CM:'Cameroon', CA:'Canada', CF:'Central African Rep.',
    TD:'Chad', CL:'Chile', CN:'China', CO:'Colombia', CD:'Congo (DRC)',
    HR:'Croatia', CU:'Cuba', CZ:'Czechia', DK:'Denmark', EC:'Ecuador',
    EG:'Egypt', SV:'El Salvador', ER:'Eritrea', EE:'Estonia', ET:'Ethiopia',
    FI:'Finland', FR:'France', PS:'Palestine', GE:'Georgia', DE:'Germany',
    GH:'Ghana', GR:'Greece', GT:'Guatemala', GN:'Guinea', HT:'Haiti',
    HN:'Honduras', HU:'Hungary', IN:'India', ID:'Indonesia', IR:'Iran',
    IQ:'Iraq', IE:'Ireland', IL:'Israel', IT:'Italy', JP:'Japan',
    JO:'Jordan', KZ:'Kazakhstan', KE:'Kenya', KP:'North Korea', KR:'South Korea',
    KW:'Kuwait', KG:'Kyrgyzstan', LA:'Laos', LV:'Latvia', LB:'Lebanon',
    LY:'Libya', LT:'Lithuania', MY:'Malaysia', ML:'Mali', MX:'Mexico',
    MD:'Moldova', MN:'Mongolia', ME:'Montenegro', MA:'Morocco', MZ:'Mozambique',
    MM:'Myanmar', NA:'Namibia', NP:'Nepal', NL:'Netherlands', NZ:'New Zealand',
    NI:'Nicaragua', NE:'Niger', NG:'Nigeria', MK:'North Macedonia', NO:'Norway',
    PK:'Pakistan', PA:'Panama', PY:'Paraguay', PE:'Peru', PH:'Philippines',
    PL:'Poland', PT:'Portugal', QA:'Qatar', RO:'Romania', RU:'Russia',
    RW:'Rwanda', SA:'Saudi Arabia', SN:'Senegal', RS:'Serbia', SL:'Sierra Leone',
    SK:'Slovakia', SI:'Slovenia', SO:'Somalia', ZA:'South Africa', SS:'South Sudan',
    ES:'Spain', LK:'Sri Lanka', SD:'Sudan', SE:'Sweden', CH:'Switzerland',
    SY:'Syria', TW:'Taiwan', TJ:'Tajikistan', TZ:'Tanzania', TH:'Thailand',
    TG:'Togo', TN:'Tunisia', TR:'Turkey', TM:'Turkmenistan', UG:'Uganda',
    UA:'Ukraine', AE:'UAE', GB:'United Kingdom', US:'United States',
    UY:'Uruguay', UZ:'Uzbekistan', VE:'Venezuela', VN:'Vietnam',
    YE:'Yemen', ZM:'Zambia', ZW:'Zimbabwe',
  };

  // ── Leaflet map init ───────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [20, 10], zoom: 2, minZoom: 2, maxZoom: 6,
    zoomControl: true, attributionControl: false,
  });

  // ── ISO numeric → alpha-2 ──────────────────────────────────────────────────
  const ISO_NUMERIC_TO_A2 = {
    '004':'AF','008':'AL','012':'DZ','024':'AO','031':'AZ','032':'AR',
    '036':'AU','040':'AT','050':'BD','051':'AM','056':'BE','064':'BT',
    '068':'BO','070':'BA','076':'BR','100':'BG','104':'MM','112':'BY',
    '116':'KH','120':'CM','124':'CA','140':'CF','144':'LK','152':'CL',
    '156':'CN','170':'CO','180':'CD','188':'CR','191':'HR','192':'CU',
    '203':'CZ','204':'BJ','208':'DK','214':'DO','218':'EC','222':'SV',
    '231':'ET','233':'EE','246':'FI','250':'FR','266':'GA','268':'GE',
    '270':'GM','275':'PS','276':'DE','288':'GH','300':'GR','320':'GT',
    '324':'GN','332':'HT','340':'HN','348':'HU','356':'IN','360':'ID',
    '364':'IR','368':'IQ','372':'IE','376':'IL','380':'IT','388':'JM',
    '392':'JP','398':'KZ','400':'JO','404':'KE','408':'KP','410':'KR',
    '414':'KW','417':'KG','418':'LA','422':'LB','428':'LV','430':'LR',
    '434':'LY','440':'LT','484':'MX','496':'MN','499':'ME','504':'MA',
    '508':'MZ','516':'NA','524':'NP','528':'NL','554':'NZ','558':'NI',
    '562':'NE','566':'NG','578':'NO','586':'PK','591':'PA','598':'PG',
    '600':'PY','604':'PE','608':'PH','616':'PL','620':'PT','634':'QA',
    '642':'RO','643':'RU','646':'RW','682':'SA','686':'SN','688':'RS',
    '694':'SL','703':'SK','704':'VN','705':'SI','706':'SO','710':'ZA',
    '716':'ZW','724':'ES','729':'SD','740':'SR','752':'SE','756':'CH',
    '760':'SY','762':'TJ','764':'TH','768':'TG','784':'AE','788':'TN',
    '792':'TR','795':'TM','800':'UG','804':'UA','807':'MK','818':'EG',
    '826':'GB','834':'TZ','840':'US','858':'UY','860':'UZ','862':'VE',
    '887':'YE','894':'ZM',
  };

  let geoLayer = null;

  // ── Load topojson lib, then geo data, then signals ────────────────────────
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
  script.onload = () => fetchGeoData().then(fetchSignals);
  document.head.appendChild(script);

  async function fetchGeoData() {
    const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
    const countries = topojson.feature(world, world.objects.countries);
    countries.features = countries.features.filter(f => {
      const id = Number(f.id);
      return id !== 10 && id !== -99 && !isNaN(id);
    });
    countries.features.forEach(f => {
      if (!f.geometry) return;
      const fix = ring => {
        for (let i = 1; i < ring.length; i++) {
          const dx = ring[i][0] - ring[i - 1][0];
          if (dx > 180)  ring[i][0] -= 360;
          if (dx < -180) ring[i][0] += 360;
        }
      };
      const coords = f.geometry.coordinates;
      if (f.geometry.type === 'Polygon')      coords.forEach(fix);
      if (f.geometry.type === 'MultiPolygon') coords.forEach(p => p.forEach(fix));
    });
    renderMap(countries);
  }

  function getCountryISO(feature) {
    return ISO_NUMERIC_TO_A2[String(feature.id).padStart(3, '0')] || null;
  }

  function styleFeature(feature) {
    const iso = getCountryISO(feature);
    const score = iso != null ? countryScores[iso] : undefined;
    return {
      fillColor: score != null ? scoreToColor(score) : '#f0f0f0',
      fillOpacity: 1,
      color: '#ccc',
      weight: 0.5,
      opacity: 1,
    };
  }

  function renderMap(geojson) {
    geoLayer = L.geoJSON(geojson, {
      style: styleFeature,
      onEachFeature(feature, layer) {
        layer.on({
          mouseover(e) {
            const iso = getCountryISO(feature);
            const score = iso != null ? countryScores[iso] : undefined;
            e.target.setStyle({
              fillColor: score != null ? scoreToColor(score) : '#e0e0e0',
              weight: 1.5,
              color: '#888',
            });
          },
          mouseout(e)  { geoLayer.resetStyle(e.target); },
          click()      { openPanel(feature); },
        });
      },
    }).addTo(map);
  }

  // ── Fetch signals.json ─────────────────────────────────────────────────────
  async function fetchSignals() {
    try {
      const data = await fetch('./data/signals.json').then(r => r.json());
      const scores = data.composite || data.scores;
      if (!scores || Object.keys(scores).length === 0) throw new Error('empty');
      countryScores = scores;
      console.log('countryScores', countryScores);
      if (geoLayer) geoLayer.setStyle(styleFeature);
      renderRankings();
      if (data.updated) {
        document.getElementById('updated').textContent =
          'Updated ' + new Date(data.updated).toLocaleString();
      }
    } catch (err) {
      document.getElementById('error-banner').style.display = 'block';
    }
  }

  // ── Rankings list ──────────────────────────────────────────────────────────
  function renderRankings() {
    const list = document.getElementById('rankings-list');
    const sorted = Object.entries(countryScores).sort((a, b) => b[1] - a[1]);
    list.innerHTML = '';
    sorted.forEach(([iso, score], i) => {
      const name = ISO_A2_TO_NAME[iso] || iso;
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.innerHTML =
        '<span class="rank-num">' + (i + 1) + '</span>' +
        '<span class="rank-swatch" style="background:' + scoreToColor(score) + '"></span>' +
        '<span class="rank-name">' + name + '</span>' +
        '<span class="rank-score">' + score + '</span>';
      row.addEventListener('click', () => openPanelForCountry(iso, name, score));
      list.appendChild(row);
    });
  }

  // ── Panel ──────────────────────────────────────────────────────────────────
  const panel        = document.getElementById('panel');
  const panelCountry = document.getElementById('panel-country');
  const panelScore   = document.getElementById('panel-score');
  const panelFill    = document.getElementById('panel-score-fill');
  const panelDesc    = document.getElementById('panel-desc');

  function openPanelForCountry(iso, name, score) {
    panelCountry.textContent = name;
    if (score != null) {
      panelScore.textContent     = score;
      panelScore.style.color     = scoreToColor(score);
      panelFill.style.width      = score + '%';
      panelFill.style.background = scoreToColor(score);
      panelDesc.textContent      = 'News mention volume from RSS feeds, normalized 0–100 across all countries in the current window.';
    } else {
      panelScore.textContent     = '—';
      panelScore.style.color     = '#111';
      panelFill.style.width      = '0%';
      panelDesc.textContent      = 'No signal data for this country in the current 24h window.';
    }
    panel.classList.add('open');
  }

  function openPanel(feature) {
    const iso   = getCountryISO(feature);
    const name  = ISO_A2_TO_NAME[iso] || iso || 'Unknown';
    const score = iso != null ? countryScores[iso] : undefined;
    openPanelForCountry(iso, name, score);
  }

  document.getElementById('panel-close').addEventListener('click', () => {
    panel.classList.remove('open');
  });

  // ── Rankings toggle (small screens) ───────────────────────────────────────
  document.getElementById('rankings-toggle').addEventListener('click', () => {
    document.getElementById('rankings').classList.toggle('visible');
  });
</script>
</body>
</html>
