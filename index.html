<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #363639;
      --hdr:     #232324;
      --sep:     #3a3a3c;
      --text:    #f5f5f7;
      --muted:   #98989f;
      --accent:  #f5f5f7;
      --mono:    ui-monospace, 'SF Mono', 'Consolas', 'Monaco', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--hdr);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: baseline;
      gap: 10px 14px;
      flex-wrap: wrap;
      padding: 14px 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Outer ── */
    .outer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* ── Status ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }
    #status.error { color: var(--muted); }

    /* ── Section header ── */
    .section-hdr {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 7px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Top row: map + clusters side by side ── */
    .top-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      align-items: flex-start;
    }

    /* ── Map ── */
    #map {
      flex: 0 0 55%;
      height: 100%;
      min-height: 280px;
      background: var(--bg);
    }
    .leaflet-container { background: var(--bg) !important; }
    .leaflet-attribution-flag { display: none !important; }
    .leaflet-overlay-pane svg { shape-rendering: crispEdges; }

    /* ── Clusters ── */
    #clusters-wrap {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .cluster-entry {
      padding: 10px 0;
      border-bottom: 1px solid rgba(58,58,60,0.5);
      cursor: pointer;
      transition: background 0.08s;
      user-select: none;
    }
    .cluster-entry:hover  { background: rgba(255,255,255,0.025); }
    .cluster-entry.active { background: rgba(255,255,255,0.04); }

    .cl-header { display: flex; align-items: baseline; gap: 8px; }
    .cl-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    .cl-layers { margin-top: 4px; }
    .cl-layer {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .cluster-entry:hover .cl-layer,
    .cluster-entry.active .cl-layer { color: var(--text); }

    .cl-factors {
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.02em;
    }
    .cluster-entry:hover .cl-factors,
    .cluster-entry.active .cl-factors { opacity: 0.8; }

    /* ── Zone labels ── */
    .zone-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0 5px;
      border-bottom: 1px solid var(--sep);
    }
    .zone-label.zone-sep { padding-top: 20px; }
    .zone-empty {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.4;
      padding: 8px 0 10px;
      border-bottom: 1px solid rgba(58,58,60,0.5);
    }

    /* ── Notable signal entries ── */
    .nt-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
    .nt-value { margin-left: auto; font-size: 11px; color: var(--text); white-space: nowrap; }
    .nt-title { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
    .cluster-entry:hover .nt-title,
    .cluster-entry.active .nt-title { color: var(--text); }

    /* ── Month header ── */
    .month-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 0 5px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Feed item — single Finder-style row ── */
    .item {
      border-bottom: 1px solid rgba(58,58,60,0.4);
    }
    .item:hover { background: rgba(255,255,255,0.02); }

    .item-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      gap: 0;
      min-width: 0;
      white-space: nowrap;
      cursor: pointer;
    }

    .item-country {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
    }
    .item-country:hover,
    .item-country.active-filter { color: var(--text); }

    .item-sep { color: var(--sep); user-select: none; padding: 0 5px; flex-shrink: 0; }

    .item-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-size: 12px;
      padding-right: 16px;
    }

    .item-src {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
      padding-right: 12px;
      opacity: 0.65;
    }

    .item-date {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
      padding-right: 10px;
      min-width: 80px;
      text-align: right;
    }

    .item-detail {
      display: none;
      padding: 2px 0 8px 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.55;
      white-space: normal;
    }
    .item.expanded .item-detail { display: block; }
    .item-detail a {
      color: var(--accent);
    }
    .item-detail a:hover { text-decoration: underline; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1c1c1e;
      border: 1px solid var(--sep);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      max-width: 300px;
      pointer-events: none;
      z-index: 9999;
    }

    .tt-score     { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .tt-rationale { color: var(--muted); }

    #feed-toggle-btn:hover { opacity: 1 !important; }
  </style>
</head>
<body>
  <header>
    <h1>HARPY</h1>
    <span id="updated"></span>
  </header>
  <div class="outer">
    <div id="status">fetching signals…</div>
    <div class="top-row">
      <div id="map" style="display:none"></div>
      <div id="clusters-wrap" style="display:none">
        <div id="clusters"></div>
      </div>
    </div>
    <div id="feed-section">
      <div id="feed-hdr" class="section-hdr" style="display:none">
        <span id="feed-label"></span>
        <span id="feed-toggle-btn" style="cursor:pointer;margin-left:8px;text-transform:none;font-size:10px;opacity:0.6"></span>
      </div>
      <div id="feed"></div>
    </div>
  </div>
  <div id="tooltip"></div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Source labels / short names ──────────────────────────────────────────

    const SOURCE_COLORS = {
      dsca:           '#4a9eff',
      fara:           '#ff6b35',
      lda:            '#a0a0b0',
      federalregister:'#c084fc',
      sam:            '#34d399',
      ofac:           '#a0a0b0',
      anchor_budget:  '#a0a0b0',
    };

    function sourceColor(s) {
      return SOURCE_COLORS[(s || '').toLowerCase()] || '#a0a0b0';
    }

    const SOURCE_LABELS = {
      dsca:           'Defense Security Cooperation Agency',
      sam:            'System for Award Management',
      fara:           'Foreign Agents Registration Act',
      ofac:           'Office of Foreign Assets Control',
      lda:            'Lobbying Disclosure Act',
      federalregister:'Federal Register',
      anchor_budget:  'Israeli Defense Budget (Knesset Finance Committee)',
    };

    const SOURCE_SHORT = {
      dsca:           'DSCA',
      sam:            'SAM',
      fara:           'FARA',
      ofac:           'OFAC',
      lda:            'LDA',
      federalregister:'FR',
      anchor_budget:  'IL-MoD',
    };

    function sourceLabel(s) {
      return SOURCE_LABELS[s && s.toLowerCase()] || (s || '').toUpperCase();
    }

    function sourceShort(s) {
      return SOURCE_SHORT[s && s.toLowerCase()] || (s || '').toUpperCase().slice(0, 5);
    }

    // ── Date helpers ─────────────────────────────────────────────────────────

    // Returns YYYY-MM-DD for N days ago (local time)
    function isoOffset(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) { const n = v / 1e9; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B'; }
      if (v >= 1e6) { const n = v / 1e6; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M'; }
      if (v >= 1e3) { const n = v / 1e3; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K'; }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtDateShort(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Tooltip ──────────────────────────────────────────────────────────────

    const tooltipEl = document.getElementById('tooltip');

    document.addEventListener('mouseover', e => {
      if (e.target.closest('#map')) return;  // map manages its own tooltip
      const target = e.target.closest('[data-tooltip]');
      if (!target) { tooltipEl.style.display = 'none'; return; }
      const [line1, ...rest] = target.dataset.tooltip.split('\n');
      tooltipEl.innerHTML =
        `<div class="tt-score">${esc(line1)}</div>` +
        rest.map(l => `<div class="tt-rationale">${esc(l)}</div>`).join('');
      tooltipEl.style.display = 'block';
    });

    document.addEventListener('mouseout', e => {
      if (e.target.closest('#map')) return;  // map manages its own tooltip
      if (e.target.closest('[data-tooltip]')) tooltipEl.style.display = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (tooltipEl.style.display !== 'block') return;
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltipEl.style.left = Math.min(x, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
      tooltipEl.style.top  = Math.min(y, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
    });

    // ── Layer taxonomy ───────────────────────────────────────────────────────
    // Add new sources here only — no other formula changes required.
    // Reserved entries are commented out until the source is implemented.
    const SOURCE_LAYER_MAP = {
      // military
      dsca:            'military',
      // anchor:       'military',    // RESERVED: reclassify anchor_budget when full MoD data lands

      // influence
      fara:            'influence',
      lda:             'influence',
      anchor_budget:   'influence',   // budget press releases = influence until reclassified

      // regulatory
      federalregister: 'regulatory',
      // ofac:         'regulatory',  // RESERVED: OFAC SDN designations

      // procurement
      sam:             'procurement',
      // usaspending:  'procurement', // RESERVED: USASpending modifications/drawdowns

      // legislative (no active sources yet)
      // congress:     'legislative', // RESERVED: Congress.gov hearing schedules

      // adversarial (no active sources yet)
      // sipri:        'adversarial', // RESERVED: SIPRI arms transfers
      // acled:        'adversarial', // RESERVED: ACLED conflict events
      // zakupki:      'adversarial', // RESERVED: zakupki.gov.ru procurement
    };

    // All layers in taxonomy order — update when adding a new layer.
    const ALL_LAYERS = ['military', 'influence', 'regulatory', 'procurement', 'legislative', 'adversarial'];

    function sigLayer(sig) {
      return SOURCE_LAYER_MAP[(sig.source || '').toLowerCase()] || null;
    }

    // Source quality weights — applied per-signal before layer contribution is summed.
    // FR is split: high-signal policy terms = 0.8, all other FR = 0.2 (cultural notices,
    // routine determinations should not constitute meaningful layer activity).
    const FR_POLICY_RE = /sanction|licen[sc]e|designation|emergency|\brule\b|regulation|export.control|\barms\b|defense|security/i;

    function sigQuality(sig) {
      const src = (sig.source || '').toLowerCase();
      if (src === 'dsca')            return 1.0;
      if (src === 'fara')            return 0.9;
      if (src === 'sam')             return 0.7;
      if (src === 'lda')             return 0.5;
      if (src === 'federalregister') return FR_POLICY_RE.test(sig.title || '') ? 0.8 : 0.2;
      return 0.5;
    }

    // Layer bonus — indexed by active layer count (0-based: index 0 = 1 layer, index 4 = 5+ layers).
    // Extensible: append entries to reward additional layers.
    const LAYER_BONUS = [1.0, 1.3, 1.8, 2.5, 3.5];

    // Dollar modifier — DSCA and SAM only, where value_usd is present.
    // $1M → 1.0, $100M → 1.15, $1B → 1.225, $10B → 1.3
    function dollarModifier(sig) {
      const src = (sig.source || '').toLowerCase();
      if ((src !== 'dsca' && src !== 'sam') || !sig.value_usd) return 1.0;
      const t = Math.log10(sig.value_usd / 1e6) / 4;
      return 1.0 + 0.3 * Math.max(0, Math.min(1, t));
    }

    // Recency decay within the 30-day convergence window.
    // 0–7 days → 1.0, 8–14 days → 0.8, 15–30 days → 0.5, beyond → 0 (excluded upstream).
    function recencyDecay(signalDate) {
      if (!signalDate) return 0;
      const ageDays = Math.round((Date.now() - new Date(signalDate).getTime()) / 86400000);
      if (ageDays <=  7) return 1.0;
      if (ageDays <= 14) return 0.8;
      if (ageDays <= 30) return 0.5;
      return 0;
    }

    // Per-layer contribution: max(quality × decay × dollarModifier) across all signals in the layer.
    function layerContribution(sigs) {
      if (!sigs.length) return 0;
      return Math.max(...sigs.map(s => sigQuality(s) * recencyDecay(s.signal_date) * dollarModifier(s)));
    }

    // ── Percentile lift (inactive) ───────────────────────────────────────────
    // ACTIVATE: replace ratio lift with percentile lift once 90-day history exists.
    // Switching is a one-line change in computeClusters: replace `ratioLift` with
    // `computePercentileLift(iso, recentWeighted, periodCounts)`.
    function computePercentileLift(iso, recentValue, historicalValues) { // eslint-disable-line no-unused-vars
      const sorted     = [...historicalValues].sort((a, b) => a - b);
      const below      = sorted.filter(v => v < recentValue).length;
      const percentile = sorted.length ? below / sorted.length : 0.5;
      // 50th percentile → 1.0, 90th → ~1.85, below median → 0.5
      return 0.5 + 1.5 * percentile;
    }

    // ── Cluster computation ──────────────────────────────────────────────────
    //
    // Formula:
    //   score = structuralScore × lift × convergence × recencyWeight × temporalBonus
    //   convergence = Σ(layerContribution) × LAYER_BONUS[layerCount - 1]
    //   layerContribution = max(sigQuality × recencyDecay × dollarModifier) per layer
    //
    function computeClusters(signals) {
      // Convergence window: 30 days. Baseline: six 14-day periods covering days 14–98.
      const w30     = isoOffset(30);
      const cutoffs = [0, 14, 28, 42, 56, 70, 84, 98].map(d => isoOffset(d));

      // Group all signals by ISO
      const byIso = new Map();
      for (const sig of signals) {
        if (!sig.iso) continue;
        if (!byIso.has(sig.iso)) byIso.set(sig.iso, []);
        byIso.get(sig.iso).push(sig);
      }

      const allScored = [];  // every ISO with meaningful activity — for full diagnostic
      const clusters  = [];  // ISOs that pass eligibility gates

      for (const [iso, sigs] of byIso) {
        const profile         = profileCache[iso] || null;
        const structuralScore = profile ? (profile.structural_interest_score || 1) : 1;

        // ── 30-day convergence window: collect signals per layer ─────────────
        const layerSigs = {};
        for (const l of ALL_LAYERS) layerSigs[l] = [];
        for (const sig of sigs) {
          if ((sig.signal_date || '') < w30) continue;
          // FR signals only count as a layer if they pass the policy keyword check.
          // A FR cultural property or routine notice does not constitute regulatory activity.
          if ((sig.source || '').toLowerCase() === 'federalregister' && !FR_POLICY_RE.test(sig.title || '')) continue;
          const layer = sigLayer(sig);
          if (layer) layerSigs[layer].push(sig);
        }

        const activeLayers = ALL_LAYERS.filter(l => layerSigs[l].length > 0);
        const layerCount   = activeLayers.length;

        // Per-layer contributions (quality × decay × dollarMod)
        const contributions = {};
        for (const l of activeLayers) contributions[l] = layerContribution(layerSigs[l]);
        const recentWeighted = Object.values(contributions).reduce((s, v) => s + v, 0);
        if (recentWeighted < 0.1) continue;  // nothing meaningful firing

        // Layer bonus — capped at the last defined index
        const layerBonus = LAYER_BONUS[Math.min(layerCount - 1, LAYER_BONUS.length - 1)];

        // Convergence
        const convergence = recentWeighted * layerBonus;

        // ── Temporal coherence bonus ─────────────────────────────────────────
        // Uses the most-recent signal date per layer to compute pairwise inter-layer gaps.
        let temporalBonus   = 1.0;
        let temporalMaxGap  = null;
        if (layerCount >= 2) {
          const latestPerLayer = activeLayers.map(l =>
            Math.max(...layerSigs[l].map(s => new Date(s.signal_date || '1970-01-01').getTime()))
          );
          let maxGapDays = 0;
          for (let i = 0; i < latestPerLayer.length; i++) {
            for (let j = i + 1; j < latestPerLayer.length; j++) {
              const gap = Math.abs(latestPerLayer[i] - latestPerLayer[j]) / 86400000;
              if (gap > maxGapDays) maxGapDays = gap;
            }
          }
          temporalMaxGap = Math.round(maxGapDays * 10) / 10;
          temporalBonus  = maxGapDays <= 3 ? 1.8 : maxGapDays <= 7 ? 1.4 : 1.0;
        }

        // ── Baseline: six 14d periods — plain quality max per layer (no decay) ─
        // No decay applied here: each historical period is uniformly "old."
        // Baseline uses same layer taxonomy so lift is a stable relative metric.
        const periodCounts = [];
        for (let p = 0; p < 6; p++) {
          const pEnd        = cutoffs[p + 1];
          const pStart      = cutoffs[p + 2];
          const pLayerSigs  = {};
          for (const l of ALL_LAYERS) pLayerSigs[l] = [];
          for (const sig of sigs) {
            const d = sig.signal_date || '';
            if (d >= pStart && d < pEnd) {
              if ((sig.source || '').toLowerCase() === 'federalregister' && !FR_POLICY_RE.test(sig.title || '')) continue;
              const layer = sigLayer(sig);
              if (layer) pLayerSigs[layer].push(sig);
            }
          }
          const pWeighted = ALL_LAYERS.reduce((s, l) => {
            const ls = pLayerSigs[l];
            return s + (ls.length ? Math.max(...ls.map(sigQuality)) : 0);
          }, 0);
          periodCounts.push(pWeighted);
        }

        const hasBaseline  = periodCounts.some(c => c > 0);
        const baselineMean = periodCounts.reduce((a, b) => a + b, 0) / 6;
        const baselineVar  = periodCounts.reduce((a, b) => a + (b - baselineMean) ** 2, 0) / 6;
        const baselineStd  = Math.sqrt(baselineVar);  // stored for Z-score / percentile upgrade

        // Ratio lift — primary formula
        const ratioLift = hasBaseline ? recentWeighted / Math.max(baselineMean, 0.5) : 1.0;
        const lift      = ratioLift;
        // ACTIVATE: replace ratio lift with percentile lift once 90-day history exists.
        // const lift = computePercentileLift(iso, recentWeighted, periodCounts);

        // ── Recency weight: median signal date within the 30-day window ───────
        const windowDates   = activeLayers.flatMap(l => layerSigs[l])
          .map(s => s.signal_date).filter(Boolean).sort();
        const medianDate    = windowDates[Math.floor(windowDates.length / 2)] || null;
        const recencyWeight = !medianDate                 ? 0.7
          : medianDate >= isoOffset(7)  ? 1.0
          : medianDate >= isoOffset(14) ? 0.7
          :                               0.5;

        const score = Math.round(Math.log2(structuralScore + 1) * lift * convergence * recencyWeight * temporalBonus * 100) / 100;

        // ── Weekly layer counts (6 weeks) — stored for future CUSUM upgrade ──
        // CUSUM would track consecutive weeks above baselineMean to boost persistent spikes.
        const weeklyLayerCounts = [];
        for (let w = 0; w < 6; w++) {
          const wStart  = isoOffset((w + 1) * 7);
          const wEnd    = isoOffset(w * 7);
          const wLayers = new Set();
          for (const sig of sigs) {
            const d = sig.signal_date || '';
            if (d >= wStart && d <= wEnd) {
              if ((sig.source || '').toLowerCase() === 'federalregister' && !FR_POLICY_RE.test(sig.title || '')) continue;
              const layer = sigLayer(sig);
              if (layer) wLayers.add(layer);
            }
          }
          weeklyLayerCounts.push(wLayers.size);
        }

        const entry = {
          iso,
          structuralScore,
          lift:             Math.round(lift * 100) / 100,
          convergence:      Math.round(convergence * 100) / 100,
          recentWeighted:   Math.round(recentWeighted * 100) / 100,
          layerBonus,
          temporalBonus,
          temporalMaxGap,
          recencyWeight,
          score,
          layerSigs,
          activeLayers,
          layerCount,
          contributions,
          medianDate,
          baselineStats:    { mean: Math.round(baselineMean * 100) / 100, std: Math.round(baselineStd * 100) / 100, periods: periodCounts },
          weeklyLayerCounts,
        };

        allScored.push(entry);

        // ── Eligibility gates ─────────────────────────────────────────────────
        // Gate 1: at least 2 distinct layers must have fired in the 30-day window.
        // Gate 2: structural score ≥ 4, or ≥ 2 with 3+ distinct layers (deep convergence exception).
        // If fewer than 5 countries qualify, show however many do — never pad with single-layer entries.
        const meetsLayers     = layerCount >= 2;
        const meetsStructural = structuralScore >= 4 || (structuralScore >= 2 && layerCount >= 3);
        if (meetsLayers && meetsStructural) clusters.push(entry);
      }

      clusters.sort((a, b) => b.score - a.score);
      allScored.sort((a, b) => b.score - a.score);

      // ── Full diagnostic — all countries with meaningful activity ─────────
      console.log('=== HARPY CLUSTER DIAGNOSTIC — ALL SCORED COUNTRIES ===');
      console.table(allScored.map(cl => ({
        iso:          cl.iso,
        structural:   cl.structuralScore,
        log2_struct:  Math.round(Math.log2(cl.structuralScore + 1) * 100) / 100,
        lift:         cl.lift,
        r_weighted:   cl.recentWeighted,
        lyr_bonus:    cl.layerBonus,
        temporal:     cl.temporalBonus,
        t_gap_d:      cl.temporalMaxGap,
        convergence:  cl.convergence,
        recency:      cl.recencyWeight,
        score:        cl.score,
        layers:       cl.activeLayers.join('+'),
        n_layers:     cl.layerCount,
        b_mean:       cl.baselineStats.mean,
        median_date:  cl.medianDate,
        eligible:     clusters.includes(cl),
      })));

      console.log('=== ZONE 1 — CONVERGENCE (eligible clusters) ===');
      console.table(clusters.map((cl, rank) => ({
        rank:         rank + 1,
        iso:          cl.iso,
        score:        cl.score,
        log2_struct:  Math.round(Math.log2(cl.structuralScore + 1) * 100) / 100,
        lift:         cl.lift,
        r_weighted:   cl.recentWeighted,
        lyr_bonus:    cl.layerBonus,
        temporal:     cl.temporalBonus,
        t_gap_d:      cl.temporalMaxGap,
        convergence:  cl.convergence,
        recency:      cl.recencyWeight,
        layers:       cl.activeLayers.join('+'),
      })));

      return clusters;  // variable length — no hard cap, never padded with single-layer entries
    }

    // ── Zone 2: Notable signal computation ───────────────────────────────────
    // Scores each individual signal in the last 30 days:
    //   score = sigQuality × dollarModifier × log2(structuralScore + 1) × recencyDecay
    // One entry per country (best signal per ISO). Top 5 returned.

    function computeNotableSignals(signals) {
      const w30 = isoOffset(30);

      // Score every signal in the 30-day window
      const scored = [];
      for (const sig of signals) {
        if ((sig.signal_date || '') < w30) continue;
        const decay = recencyDecay(sig.signal_date);
        if (!decay) continue;
        const quality = sigQuality(sig);
        if (quality < 0.7) continue;  // Zone 2 minimum: DSCA(1.0), FARA(0.9), FR-policy(0.8), SAM(0.7)
        // LDA(0.5) excluded — standalone lobbying disclosure is not a standalone signal.
        // Exception path (FARA-equivalent foreign govt LDA) not yet detectable from data.
        const profile       = profileCache[sig.iso] || null;
        const structScore   = profile ? (profile.structural_interest_score || 1) : 1;
        const score = quality * dollarModifier(sig) * Math.log2(structScore + 1) * decay;
        scored.push({ sig, score: Math.round(score * 10000) / 10000, structScore });
      }

      // Best signal per ISO
      const bestByIso = new Map();
      for (const entry of scored) {
        const iso = entry.sig.iso;
        if (!bestByIso.has(iso) || entry.score > bestByIso.get(iso).score) {
          bestByIso.set(iso, entry);
        }
      }

      const top5 = [...bestByIso.values()]
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      console.log('=== ZONE 2 — NOTABLE SIGNALS ===');
      console.table(top5.map((e, i) => ({
        rank:        i + 1,
        iso:         e.sig.iso,
        score:       e.score,
        source:      e.sig.source,
        quality:     sigQuality(e.sig),
        dollar_mod:  Math.round(dollarModifier(e.sig) * 1000) / 1000,
        log2_struct: Math.round(Math.log2(e.structScore + 1) * 1000) / 1000,
        decay:       recencyDecay(e.sig.signal_date),
        date:        e.sig.signal_date,
        title:       (e.sig.title || '').slice(0, 55),
      })));

      return top5;
    }

    // ── Layer line synthesis ─────────────────────────────────────────────────

    // Produces one human-readable line per firing layer.
    // Uses the most-recent signal in that layer's 14d window for the summary.
    function synthesizeLayerLine(layer, sigs) {
      if (!sigs.length) return null;
      const sorted = [...sigs].sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));
      const top    = sorted[0];
      const date   = fmtDateShort(top.signal_date);
      const extra  = sigs.length > 1 ? ' +' + (sigs.length - 1) : '';

      if (layer === 'military') {
        const val        = top.value_usd ? fmtValue(top.value_usd) + ' ' : '';
        const titleRaw   = top.title || '';
        const titleClean = titleRaw.includes(' \u2014 ')
          ? titleRaw.split(' \u2014 ').slice(1).join(' \u2014 ')
          : titleRaw;
        const title = titleClean.length > 45 ? titleClean.slice(0, 42) + '\u2026' : titleClean;
        return `${sourceShort(top.source)}: ${val}${title} ${date}${extra}`;
      }

      if (layer === 'influence') {
        const counts = {};
        for (const s of sigs) {
          const k = sourceShort(s.source);
          counts[k] = (counts[k] || 0) + 1;
        }
        const parts = Object.entries(counts).map(([k, n]) => `${k} ${n}`);
        return parts.join('  ') + ' \u2014 ' + date;
      }

      if (layer === 'regulatory') {
        const titleRaw = top.title || '';
        const title    = titleRaw.length > 50 ? titleRaw.slice(0, 47) + '\u2026' : titleRaw;
        return `${sourceShort(top.source)}: ${title} ${date}${extra}`;
      }

      if (layer === 'procurement') {
        const val      = top.value_usd ? fmtValue(top.value_usd) + ' ' : '';
        const titleRaw = top.title || '';
        const title    = titleRaw.length > 45 ? titleRaw.slice(0, 42) + '\u2026' : titleRaw;
        return `${sourceShort(top.source)}: ${val}${title} ${date}${extra}`;
      }

      return sourceShort(top.source) + ': ' + sigs.length + ' \u2014 ' + date;
    }

    // ── Render clusters ──────────────────────────────────────────────────────

    let activeFilter = null;

    function renderClusters(clusters, notable, signals) {
      const wrap      = document.getElementById('clusters-wrap');
      const container = document.getElementById('clusters');

      // Show the panel whenever there is something to display in either zone
      if (!clusters.length && !notable.length) return;
      wrap.style.display = '';
      container.innerHTML = '';

      // Helper: make an entry clickable for feed filtering
      function bindFilter(entry, iso) {
        entry.addEventListener('click', () => {
          if (activeFilter === iso) {
            activeFilter = null;
            entry.classList.remove('active');
          } else {
            container.querySelectorAll('.cluster-entry.active')
              .forEach(r => r.classList.remove('active'));
            activeFilter = iso;
            entry.classList.add('active');
          }
          syncMapFilter(activeFilter);
          renderFeed(signals);
        });
      }

      // ── Zone 1: CONVERGENCE ───────────────────────────────────────────────
      const z1Label = document.createElement('div');
      z1Label.className = 'zone-label';
      z1Label.textContent = 'CONVERGENCE';
      container.appendChild(z1Label);

      if (!clusters.length) {
        const empty = document.createElement('div');
        empty.className = 'zone-empty';
        empty.textContent = 'no cross-layer signals in current window';
        container.appendChild(empty);
      } else {
        // clusters contains all eligibility-gated countries, sorted by score — no hard cap
        for (const cl of clusters) {
          const profile = profileCache[cl.iso] || null;
          const name    = (profile ? profile.name : cl.iso).toUpperCase();

          const entry = document.createElement('div');
          entry.className = 'cluster-entry';
          entry.dataset.iso = cl.iso;

          let html = `<div class="cl-header"><span class="cl-name">${esc(name)}</span></div>`;

          // Structural interest factors only — no source labels
          const factors = profile && profile.key_structural_interests;
          if (factors && factors.length) {
            html += `<div class="cl-factors" style="opacity:0.8">${esc(factors.slice(0, 3).join(' \xb7 '))}</div>`;
          }

          entry.innerHTML = html;
          bindFilter(entry, cl.iso);
          container.appendChild(entry);
        }
      }

      // ── Zone 2: NOTABLE SIGNALS ───────────────────────────────────────────
      const z2Label = document.createElement('div');
      z2Label.className = 'zone-label zone-sep';
      z2Label.textContent = 'NOTABLE SIGNALS';
      container.appendChild(z2Label);

      for (const { sig, structScore } of notable) {
        const profile = profileCache[sig.iso] || null;
        const name    = (profile ? profile.name : sig.iso).toUpperCase();

        // Clean title: strip leading "Country — " from DSCA records
        const raw = sig.title || '';
        const src = (sig.source || '').toLowerCase();
        let title = (src === 'dsca' && raw.includes('\u2014'))
          ? raw.split('\u2014').slice(1).join('\u2014').trim()
          : raw;
        if (title.length > 55) title = title.slice(0, 52) + '\u2026';

        const color  = sourceColor(sig.source);
        const badge  = sourceShort(sig.source);
        const valStr = sig.value_usd ? fmtValue(sig.value_usd) : '';

        const entry = document.createElement('div');
        entry.className = 'cluster-entry';
        entry.dataset.iso = sig.iso;

        let html = `<div class="cl-header">`;
        html += `<span class="cl-name">${esc(name)}</span>`;
        html += `<span class="nt-badge" style="color:${color}">${esc(badge)}</span>`;
        if (valStr) html += `<span class="nt-value">${esc(valStr)}</span>`;
        html += `</div>`;
        html += `<div class="nt-title">${esc(title)}</div>`;

        entry.innerHTML = html;
        bindFilter(entry, sig.iso);
        container.appendChild(entry);
      }
    }

    // ── Render feed ──────────────────────────────────────────────────────────

    function renderFeed(signals) {
      const feedEl    = document.getElementById('feed');
      const feedHdr   = document.getElementById('feed-hdr');
      const feedLabel = document.getElementById('feed-label');
      const toggleBtn = document.getElementById('feed-toggle-btn');
      feedEl.innerHTML = '';

      let visible;
      if (activeFilter) {
        visible = signals.filter(s => s.iso === activeFilter);
        feedHdr.style.display = '';
        const p = profileCache[activeFilter];
        feedLabel.textContent = p ? p.name : activeFilter;
        toggleBtn.textContent = '[clear filter]';
        toggleBtn.onclick = () => {
          activeFilter = null;
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
          syncMapFilter(null);
          renderFeed(signals);
        };
      } else {
        visible = signals;
        feedHdr.style.display = 'none';
      }

      if (!visible.length) {
        feedEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      const byMonth = new Map();
      for (const sig of visible) {
        const key = sig.signal_date ? sig.signal_date.slice(0, 7) : '';
        if (!byMonth.has(key)) byMonth.set(key, []);
        byMonth.get(key).push(sig);
      }

      for (const [monthKey, monthSigs] of byMonth) {
        const hdr = document.createElement('div');
        hdr.className = 'month-header';
        if (monthKey) {
          const [y, m] = monthKey.split('-').map(Number);
          hdr.textContent = new Date(y, m - 1, 1)
            .toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            .toUpperCase();
        }
        feedEl.appendChild(hdr);
        for (const sig of monthSigs) {
          feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null, signals));
        }
      }
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile, signals) {
      const country = profile ? profile.name : sig.iso;
      const el      = document.createElement('div');
      el.className  = 'item';

      // Country tooltip with structural interest context
      let countryTooltip = '';
      if (profile) {
        const ttParts = [];
        const s = profile.structural_interest_score;
        if (s != null) ttParts.push(`Structural interest: ${s}/10`);
        if (profile.score_rationale) ttParts.push(profile.score_rationale);
        if (ttParts.length) countryTooltip = ` data-tooltip="${esc(ttParts.join('\n'))}"`;
      }

      const sourceUrl = sig.page_url || sig.url || null;
      const descRaw   = sig.description || '';
      const srcFull   = sourceLabel(sig.source);

      // Title: strip "Country — " prefix common in DSCA titles; append value if present
      let titleStr = sig.title || sig.description || '—';
      if (titleStr.includes(' \u2014 ')) {
        titleStr = titleStr.split(' \u2014 ').slice(1).join(' \u2014 ');
      }
      if (sig.value_usd != null) titleStr += '  ' + fmtValue(sig.value_usd);

      const hasDetail = !!(descRaw || sourceUrl);
      const isFiltered   = activeFilter === sig.iso;
      const countryClass = 'item-country' + (isFiltered ? ' active-filter' : '');

      // Expanded detail: description + source link
      let detailInner = '';
      if (descRaw) {
        const trunc = descRaw.length > 800 ? descRaw.slice(0, 800) + '\u2026' : descRaw;
        detailInner += esc(trunc);
      }
      if (sourceUrl) {
        detailInner += (detailInner ? '  ' : '') +
          `<a href="${esc(sourceUrl)}" target="_blank" rel="noopener">source \u2197</a>`;
      }

      el.innerHTML =
        `<div class="item-row">` +
          `<span class="${countryClass}"${countryTooltip}>${esc(country)}</span>` +
          `<span class="item-sep">\xb7</span>` +
          `<span class="item-title">${esc(titleStr)}</span>` +
          `<span class="item-src" style="color:${sourceColor(sig.source)}">${esc(sourceShort(sig.source))}</span>` +
          `<span class="item-date">${esc(fmtDate(sig.signal_date))}</span>` +
        `</div>` +
        (hasDetail ? `<div class="item-detail">${detailInner}</div>` : '');

      if (hasDetail) {
        el.querySelector('.item-row').addEventListener('click', e => {
          if (e.target.classList.contains('item-country')) return;
          const wasExpanded = el.classList.contains('expanded');
          document.querySelectorAll('.item.expanded').forEach(i => i.classList.remove('expanded'));
          if (!wasExpanded) el.classList.add('expanded');
        });
      }

      if (sig.iso) {
        el.querySelector('.item-country').addEventListener('click', e => {
          e.stopPropagation();
          activeFilter = activeFilter === sig.iso ? null : sig.iso;
          document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
          if (activeFilter) {
            const clRow = document.querySelector(`.cluster-entry[data-iso="${activeFilter}"]`);
            if (clRow) clRow.classList.add('active');
          }
          syncMapFilter(activeFilter);
          renderFeed(signals);
        });
      }

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe, skip US/null/XX iso, filter to 2025+, sort newest first
      // XX = FARA records where country extraction failed in fetch_fara.py pipeline
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.iso && s.iso !== 'US' && s.iso !== 'XX')
        .filter(s => (s.signal_date || '') >= '2025-01-01')
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        document.getElementById('feed').innerHTML =
          '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      // Load all profiles in parallel
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      const clusters = computeClusters(signals);
      const notable  = computeNotableSignals(signals);
      renderClusters(clusters, notable, signals);
      renderFeed(signals);
      initMap(clusters, notable, signals);
    }

    main();
  </script>

      const ACTIVE_COLOR   = '#d8d8d8';
      const BORDER_COLOR   = '#252525';

      const isoToLayer = new Map();

      function baseColorFor(iso) {
        if (activeFilter && iso === activeFilter) return ACTIVE_COLOR;
        if (iso && clusterIsos.has(iso)) return ZONE1_COLOR;   // convergence wins
        if (iso && notableIsos.has(iso)) return NOTABLE_COLOR;
        return BASE_COLOR;
      }

      L.geoJSON(fixedCountries, {
        renderer: L.svg({ padding: 0.5 }),
        style: f => ({
          fillColor:   baseColorFor(ISO_NUM_TO_A2[+f.id]),
          fillOpacity: 1,
          color:       BORDER_COLOR,
          weight:      1.5,
        }),
        onEachFeature: (f, layer) => {
          const iso     = ISO_NUM_TO_A2[+f.id];
          const profile = iso ? profileCache[iso] : null;
          if (iso) isoToLayer.set(iso, layer);

          layer.on('mouseover', e => {
            layer.setStyle({ fillColor: HOVER_COLOR });
            const name = profile ? (profile.name || iso) : iso;
            let ttHtml = `<div class="tt-score">${esc(name)}</div>`;
            if (profile) {
              if (profile.structural_interest_score != null)
                ttHtml += `<div class="tt-rationale">${esc('Structural interest: ' + profile.structural_interest_score + '/10')}</div>`;
              if (profile.score_rationale)
                ttHtml += `<div class="tt-rationale">${esc(profile.score_rationale)}</div>`;
            }
            tooltipEl.innerHTML = ttHtml;
            tooltipEl.style.display = 'block';
            const me = e.originalEvent;
            tooltipEl.style.left = Math.min(me.clientX + 14, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
            tooltipEl.style.top  = Math.min(me.clientY + 14, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
          });

          layer.on('mousemove', e => {
            if (tooltipEl.style.display !== 'block') return;
            const me = e.originalEvent;
            tooltipEl.style.left = Math.min(me.clientX + 14, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
            tooltipEl.style.top  = Math.min(me.clientY + 14, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
          });

          layer.on('mouseout', () => {
            layer.setStyle({ fillColor: baseColorFor(iso) });
            tooltipEl.style.display = 'none';
          });

          layer.on('click', () => {
            if (!iso) return;
            activeFilter = activeFilter === iso ? null : iso;
            document.querySelectorAll('.cluster-entry.active').forEach(r => r.classList.remove('active'));
            if (activeFilter) {
              const clRow = document.querySelector(`.cluster-entry[data-iso="${activeFilter}"]`);
              if (clRow) clRow.classList.add('active');
            }
            syncMapFilter(activeFilter);
            renderFeed(signals);
          });
        },
      }).addTo(leafletMap);

      // Default bounds: full populated world, Antarctica clipped at -60.
      // invalidateSize() forces Leaflet to re-measure the container before fitting,
      // preventing the sizing race condition where fitBounds runs before CSS layout.
      const DEFAULT_BOUNDS = [[-60, -180], [75, 180]];
      leafletMap.invalidateSize();
      leafletMap.fitBounds(DEFAULT_BOUNDS, { padding: [4, 4] });

      // Expose map highlight + zoom so cluster/feed clicks can sync the map
      syncMapFilter = function(activeIso) {
        for (const [layerIso, lyr] of isoToLayer) {
          let color;
          if (activeIso && layerIso === activeIso)    color = ACTIVE_COLOR;
          else if (clusterIsos.has(layerIso))         color = ZONE1_COLOR;
          else if (notableIsos.has(layerIso))         color = NOTABLE_COLOR;
          else                                        color = BASE_COLOR;
          lyr.setStyle({ fillColor: color });
        }
        if (activeIso) {
          const lyr = isoToLayer.get(activeIso);
          if (lyr) leafletMap.fitBounds(lyr.getBounds(), { padding: [30, 30] });
        } else {
          leafletMap.invalidateSize();
          leafletMap.fitBounds(DEFAULT_BOUNDS, { padding: [4, 4] });
        }
      };
    }
  </script>
</body>
</html>
