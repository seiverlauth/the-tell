<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #2c2c2e;
      --hdr:     #232324;
      --sep:     #3a3a3c;
      --text:    #f5f5f7;
      --muted:   #98989f;
      --accent:  #f5f5f7;
      --sans:    system-ui, -apple-system, sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--hdr);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: baseline;
      gap: 10px 14px;
      flex-wrap: wrap;
      padding: 14px 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    header > span:first-of-type {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Outer ── */
    .outer {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* ── Status ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }
    #status.error { color: #f87171; }

    /* ── Month header ── */
    .month-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 24px 16px 8px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Feed item ── */
    .item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--sep);
      cursor: default;
      transition: background 0.1s;
    }


    .item:hover                 { background: rgba(255,255,255,0.035); }
    .item.tint-amber            { background: rgba(245,158,11,0.12); }
    .item.tint-red              { background: rgba(239,68,68,0.15); }
    .item.tint-amber:hover      { background: rgba(245,158,11,0.17); }
    .item.tint-red:hover        { background: rgba(239,68,68,0.21); }

    /* Line 1: description + value */
    .row1 {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
    }

    .item-desc {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }

    .item-val {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Line 2: country · source */
    .row2 {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
    }

    .item-country {
      color: var(--muted);
      position: relative;
    }

    .sep { color: var(--muted); user-select: none; }

    .source-link {
      color: var(--muted);
      font-size: 13px;
    }
    .source-link:hover { text-decoration: underline; }

    .source-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--sep);
      padding: 1px 5px;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1c1c1e;
      border: 1px solid var(--sep);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      max-width: 300px;
      pointer-events: none;
      z-index: 100;
    }

    .tt-score {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .tt-rationale {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>HARPY</h1>
    <span>Hidden Action Reconnaissance Pre-narrative Yield</span>
    <span id="updated"></span>
  </header>
  <div class="outer">
    <div id="status">fetching signals…</div>
    <div id="feed"></div>
  </div>
  <div id="tooltip"></div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) {
        const n = v / 1e9;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B';
      }
      if (v >= 1e6) {
        const n = v / 1e6;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M';
      }
      if (v >= 1e3) {
        const n = v / 1e3;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K';
      }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Tooltip ──────────────────────────────────────────────────────────────

    const tooltipEl = document.getElementById('tooltip');

    document.addEventListener('mouseover', e => {
      const target = e.target.closest('[data-tooltip]');
      if (!target) { tooltipEl.style.display = 'none'; return; }
      const [line1, ...rest] = target.dataset.tooltip.split('\n');
      tooltipEl.innerHTML =
        `<div class="tt-score">${esc(line1)}</div>` +
        rest.map(l => `<div class="tt-rationale">${esc(l)}</div>`).join('');
      tooltipEl.style.display = 'block';
    });

    document.addEventListener('mouseout', e => {
      if (e.target.closest('[data-tooltip]')) tooltipEl.style.display = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (tooltipEl.style.display !== 'block') return;
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltipEl.style.left = Math.min(x, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
      tooltipEl.style.top  = Math.min(y, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
    });

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile) {
      const country = profile ? profile.name : sig.iso;
      const score   = profile ? profile.structural_interest_score : null;

      const el = document.createElement('div');
      el.className = 'item';

      // Heatmap tint
      if (score != null) {
        if      (score >= 7) el.classList.add('tint-red');
        else if (score >= 4) el.classList.add('tint-amber');
      }

      // Whole-row tooltip
      if (profile) {
        const ttParts = [];
        if (score != null) ttParts.push(`Structural interest: ${score}/10`);
        if (profile.score_rationale) ttParts.push(profile.score_rationale);
        if (ttParts.length) el.dataset.tooltip = ttParts.join('\n');
      }

      // Source link (inline on row 2)
      const sourceUrl = sig.page_url || null;
      const sourceInline = sourceUrl
        ? `<span class="sep">·</span>${fmtDate(sig.signal_date)}<span class="sep">·</span><a class="source-link" href="${esc(sourceUrl)}" target="_blank" rel="noopener">source →</a>`
        : `<span class="sep">·</span>${fmtDate(sig.signal_date)}`;

      el.innerHTML = `
        <div class="row1">
          <span class="item-desc">${esc(sig.title || sig.description || '—')}</span>
          <span class="item-val">${fmtValue(sig.value_usd)}</span>
        </div>
        <div class="row2"><span class="source-tag">${esc(sig.source || '')}</span><span class="sep">·</span><span class="item-country">${esc(country)}</span>${sourceInline}</div>
      `.trim();

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const feedEl    = document.getElementById('feed');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe on cn_number, skip US/null iso, sort newest first
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.iso && s.iso !== 'US')
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        feedEl.innerHTML = '<div id="status">no signals</div>';
        return;
      }

      // Fetch all profiles in parallel
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      // Group by month (insertion order preserves newest-first sort)
      const byMonth = new Map();
      for (const sig of signals) {
        const key = sig.signal_date ? sig.signal_date.slice(0, 7) : '';
        if (!byMonth.has(key)) byMonth.set(key, []);
        byMonth.get(key).push(sig);
      }

      for (const [monthKey, monthSigs] of byMonth) {
        const hdr = document.createElement('div');
        hdr.className = 'month-header';
        if (monthKey) {
          const [y, m] = monthKey.split('-').map(Number);
          hdr.textContent = new Date(y, m - 1, 1)
            .toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            .toUpperCase();
        }
        feedEl.appendChild(hdr);
        for (const sig of monthSigs) {
          feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null));
        }
      }
    }

    main();
  </script>
</body>
</html>
