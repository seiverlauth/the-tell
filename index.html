<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #2c2c2e;
      --hdr:     #232324;
      --sep:     #3a3a3c;
      --text:    #f5f5f7;
      --muted:   #98989f;
      --accent:  #f5f5f7;
      --mono:    ui-monospace, 'SF Mono', 'Consolas', 'Monaco', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: var(--hdr);
      border-bottom: 1px solid var(--sep);
      display: flex;
      align-items: baseline;
      gap: 10px 14px;
      flex-wrap: wrap;
      padding: 14px 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Outer ── */
    .outer {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* ── Status ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }
    #status.error { color: #f87171; }

    /* ── Section header ── */
    .section-hdr {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 7px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Clusters ── */
    #clusters-wrap { margin-bottom: 4px; }

    .cluster-row {
      padding: 5px 0;
      border-bottom: 1px solid rgba(58,58,60,0.5);
      cursor: pointer;
      transition: background 0.08s;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cluster-row:hover       { color: var(--text); }
    .cluster-row.active      { color: var(--text); background: rgba(255,255,255,0.04); }
    .cluster-row.hot         { background: rgba(239,68,68,0.10); }
    .cluster-row.hot:hover   { background: rgba(239,68,68,0.16); color: var(--text); }
    .cluster-row.hot.active  { background: rgba(239,68,68,0.18); }

    .cl-name {
      font-weight: 600;
      color: var(--muted);
    }
    .cluster-row:hover .cl-name,
    .cluster-row.active .cl-name { color: var(--text); }

    .cl-meta { color: var(--muted); }
    .cl-anomaly { color: var(--muted); }
    .cluster-row.hot .cl-anomaly { color: #f87171; }

    /* ── Month header ── */
    .month-header {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 0 5px;
      border-bottom: 1px solid var(--sep);
    }

    /* ── Feed item — compact log line ── */
    .item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(58,58,60,0.6);
      cursor: default;
      transition: background 0.08s;
    }

    .item:hover             { background: rgba(255,255,255,0.025); }
    .item.tint-amber        { background: rgba(245,158,11,0.10); }
    .item.tint-red          { background: rgba(239,68,68,0.13); }
    .item.tint-amber:hover  { background: rgba(245,158,11,0.15); }
    .item.tint-red:hover    { background: rgba(239,68,68,0.18); }

    .row1 {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .item-desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .item-val.val-billion { color: #4ade80; }

    .row2 {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
      font-size: 11px;
      color: var(--muted);
    }

    .item-country { color: var(--muted); font-weight: 600; cursor: pointer; }
    .item-country:hover, .item-country.active-filter { color: var(--text); }

    .sep { color: var(--sep); user-select: none; }

    .details-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      user-select: none;
    }
    .details-row:hover { opacity: 1; }

    .details-btn { cursor: pointer; }
    .details-btn:hover { text-decoration: underline; }

    .details-body {
      display: none;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.7;
      line-height: 1.5;
    }
    .item.expanded .details-body { display: block; }
    .item.expanded .details-row  { opacity: 1; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1c1c1e;
      border: 1px solid var(--sep);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      max-width: 300px;
      pointer-events: none;
      z-index: 100;
    }

    .tt-score     { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .tt-rationale { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>HARPY</h1>
    <span id="updated"></span>
  </header>
  <div class="outer">
    <div id="status">fetching signals…</div>
    <div id="clusters-wrap" style="display:none">
      <div class="section-hdr">clusters · multi-source · anomaly</div>
      <div id="clusters"></div>
    </div>
    <div id="feed-section">
      <div id="feed"></div>
    </div>
  </div>
  <div id="tooltip"></div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Source labels / short names ──────────────────────────────────────────

    const SOURCE_LABELS = {
      dsca: 'Defense Security Cooperation Agency',
      sam:  'System for Award Management',
      fara: 'Foreign Agents Registration Act',
      ofac: 'Office of Foreign Assets Control',
      lda:  'Lobbying Disclosure Act',
      federalregister: 'Federal Register',
    };

    const SOURCE_SHORT = {
      dsca: 'DSCA',
      sam:  'SAM',
      fara: 'FARA',
      ofac: 'OFAC',
      lda:  'LDA',
      federalregister: 'FR',
    };

    function sourceLabel(s) {
      return SOURCE_LABELS[s && s.toLowerCase()] || (s || '').toUpperCase();
    }

    function sourceShort(s) {
      return SOURCE_SHORT[s && s.toLowerCase()] || (s || '').toUpperCase().slice(0, 5);
    }

    // ── Date helpers ─────────────────────────────────────────────────────────

    // Returns YYYY-MM-DD for N days ago (local time)
    function isoOffset(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) { const n = v / 1e9; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B'; }
      if (v >= 1e6) { const n = v / 1e6; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M'; }
      if (v >= 1e3) { const n = v / 1e3; return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K'; }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtDateShort(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Tooltip ──────────────────────────────────────────────────────────────

    const tooltipEl = document.getElementById('tooltip');

    document.addEventListener('mouseover', e => {
      const target = e.target.closest('[data-tooltip]');
      if (!target) { tooltipEl.style.display = 'none'; return; }
      const [line1, ...rest] = target.dataset.tooltip.split('\n');
      tooltipEl.innerHTML =
        `<div class="tt-score">${esc(line1)}</div>` +
        rest.map(l => `<div class="tt-rationale">${esc(l)}</div>`).join('');
      tooltipEl.style.display = 'block';
    });

    document.addEventListener('mouseout', e => {
      if (e.target.closest('[data-tooltip]')) tooltipEl.style.display = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (tooltipEl.style.display !== 'block') return;
      const x = e.clientX + 14, y = e.clientY + 14;
      tooltipEl.style.left = Math.min(x, window.innerWidth  - tooltipEl.offsetWidth  - 8) + 'px';
      tooltipEl.style.top  = Math.min(y, window.innerHeight - tooltipEl.offsetHeight - 8) + 'px';
    });

    // ── Cluster computation ──────────────────────────────────────────────────

    function computeClusters(signals) {
      // Date cutoffs computed fresh against today (local time)
      const cutoff14 = isoOffset(14);   // 14 days ago  — recent window
      const cutoff98 = isoOffset(98);   // 98 days ago  — baseline start (14 + 84)

      const byIso = new Map();
      for (const sig of signals) {
        if (!sig.iso) continue;
        if (!byIso.has(sig.iso)) byIso.set(sig.iso, { sigs: [], sources: new Set() });
        const e = byIso.get(sig.iso);
        e.sigs.push(sig);
        if (sig.source) e.sources.add(sig.source.toLowerCase());
      }

      const clusters = [];
      for (const [iso, { sigs, sources }] of byIso) {
        if (sources.size < 2) continue;

        // Recent window: last 14 days
        const recent14 = sigs.filter(s => (s.signal_date || '') >= cutoff14);
        if (!recent14.length) continue;

        // Baseline: days 15–98 ago (84 days = six 14-day periods), normalized to 14-day rate
        const baseline84 = sigs.filter(s => {
          const d = s.signal_date || '';
          return d >= cutoff98 && d < cutoff14;
        });
        const baseline14Avg = baseline84.length / 6;

        // Rate ratio: how many times busier than the rolling 14-day baseline?
        // Floor baseline at 0.5 so cold-start countries score high but interpretably
        // (a country with no history and 1 recent signal → anomaly 2.0, not infinity)
        const anomaly = recent14.length / Math.max(baseline14Avg, 0.5);

        // Combined score weights rate ratio by source diversity:
        // log2(n+1): 1 src→1.0, 2→1.58, 3→2.0, 4→2.32
        // Ensures DSCA+SAM+FARA convergence ranks above two-source noise at same rate
        const score = anomaly * Math.log2(sources.size + 1);

        const allDates  = sigs.map(s => s.signal_date).filter(Boolean).sort();
        const mostRecent = allDates[allDates.length - 1] || null;

        clusters.push({
          iso,
          sourceDiversity: sources.size,
          sources: [...sources].sort(),
          totalSignals: sigs.length,
          recent14: recent14.length,
          baseline14Avg,
          anomaly,
          score,
          mostRecent,
        });
      }

      // Sort by combined score descending
      clusters.sort((a, b) => b.score - a.score);
      return clusters;
    }

    // ── Render clusters ──────────────────────────────────────────────────────

    let activeFilter = null;

    function renderClusters(clusters, signals) {
      const wrap      = document.getElementById('clusters-wrap');
      const container = document.getElementById('clusters');
      if (!clusters.length) return;

      wrap.style.display = '';
      container.innerHTML = '';

      for (const cl of clusters) {
        const profile   = profileCache[cl.iso] || null;
        const name      = (profile ? profile.name : cl.iso).toUpperCase();
        const anomalyFmt = cl.anomaly >= 10
          ? '\xd7' + Math.round(cl.anomaly)
          : '\xd7' + cl.anomaly.toFixed(1);
        const hot = cl.score > 3;

        const row = document.createElement('div');
        row.className = 'cluster-row' + (hot ? ' hot' : '');
        row.dataset.iso = cl.iso;

        row.innerHTML =
          `<span class="cl-name">${esc(name)}</span>` +
          `<span class="cl-meta"> — ${cl.sourceDiversity} source${cl.sourceDiversity !== 1 ? 's' : ''}` +
          ` — ${cl.totalSignals} signal${cl.totalSignals !== 1 ? 's' : ''}` +
          ` — <span class="cl-anomaly">anomaly ${esc(anomalyFmt)}</span>` +
          ` — last ${esc(fmtDateShort(cl.mostRecent))}</span>`;

        row.addEventListener('click', () => {
          if (activeFilter === cl.iso) {
            activeFilter = null;
            row.classList.remove('active');
          } else {
            container.querySelectorAll('.cluster-row.active')
              .forEach(r => r.classList.remove('active'));
            activeFilter = cl.iso;
            row.classList.add('active');
          }
          renderFeed(signals);
        });

        container.appendChild(row);
      }
    }

    // ── Render feed ──────────────────────────────────────────────────────────

    function renderFeed(signals) {
      const feedEl = document.getElementById('feed');
      feedEl.innerHTML = '';

      const visible = activeFilter
        ? signals.filter(s => s.iso === activeFilter)
        : signals;

      if (!visible.length) {
        feedEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      const byMonth = new Map();
      for (const sig of visible) {
        const key = sig.signal_date ? sig.signal_date.slice(0, 7) : '';
        if (!byMonth.has(key)) byMonth.set(key, []);
        byMonth.get(key).push(sig);
      }

      for (const [monthKey, monthSigs] of byMonth) {
        const hdr = document.createElement('div');
        hdr.className = 'month-header';
        if (monthKey) {
          const [y, m] = monthKey.split('-').map(Number);
          hdr.textContent = new Date(y, m - 1, 1)
            .toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            .toUpperCase();
        }
        feedEl.appendChild(hdr);
        for (const sig of monthSigs) {
          feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null, signals));
        }
      }
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile, signals) {
      const country = profile ? profile.name : sig.iso;
      const score   = profile ? profile.structural_interest_score : null;

      const el = document.createElement('div');
      el.className = 'item';

      if (score != null) {
        if      (score >= 7) el.classList.add('tint-red');
        else if (score >= 4) el.classList.add('tint-amber');
      }

      let countryTooltip = '';
      if (profile) {
        const ttParts = [];
        if (score != null) ttParts.push(`Structural interest: ${score}/10`);
        if (profile.score_rationale) ttParts.push(profile.score_rationale);
        if (ttParts.length) countryTooltip = ` data-tooltip="${esc(ttParts.join('\n'))}"`;
      }

      const sourceUrl  = sig.page_url || sig.url || null;
      const descRaw    = sig.description || '';
      const descTrunc  = descRaw.length > 800 ? descRaw.slice(0, 800) + '\u2026' : descRaw;
      const srcShort   = sourceShort(sig.source);

      const sourceBtn  = sourceUrl
        ? `<a class="details-btn" href="${esc(sourceUrl)}" target="_blank" rel="noopener">${esc(srcShort)}</a>`
        : `<span>${esc(srcShort)}</span>`;
      const detailsBtn  = descTrunc ? `<span class="details-btn details-expand">details</span>` : '';
      const detailsPipe = detailsBtn ? `<span class="sep">·</span>` : '';

      const detailsHtml = (descTrunc || sourceUrl)
        ? `<div class="details-row">${sourceBtn}${detailsPipe}${detailsBtn}</div>` +
          (descTrunc ? `<div class="details-body">${esc(descTrunc)}</div>` : '')
        : '';

      const valHtml = sig.value_usd != null
        ? `<span class="item-val${sig.value_usd >= 1e9 ? ' val-billion' : ''}">${esc(fmtValue(sig.value_usd))}</span>`
        : '';

      const isFiltered = activeFilter === sig.iso;
      const countryClass = 'item-country' + (isFiltered ? ' active-filter' : '');

      el.innerHTML =
        `<div class="row1">` +
          `<span class="item-desc">${esc(sig.title || sig.description || '—')}</span>` +
          valHtml +
        `</div>` +
        `<div class="row2">` +
          `<span class="${countryClass}"${countryTooltip}>${esc(country)}</span>` +
          `<span class="sep">·</span>` +
          `<span>${esc(fmtDate(sig.signal_date))}</span>` +
        `</div>` +
        detailsHtml;

      const expand = el.querySelector('.details-expand');
      if (expand) {
        expand.addEventListener('click', e => {
          e.stopPropagation();
          const wasExpanded = el.classList.contains('expanded');
          document.querySelectorAll('.item.expanded').forEach(i => i.classList.remove('expanded'));
          if (!wasExpanded) el.classList.add('expanded');
        });
      }

      if (sig.iso) {
        el.querySelector('.item-country').addEventListener('click', e => {
          e.stopPropagation();
          if (activeFilter === sig.iso) {
            activeFilter = null;
          } else {
            activeFilter = sig.iso;
          }
          // Sync cluster bar active state
          document.querySelectorAll('.cluster-row.active').forEach(r => r.classList.remove('active'));
          if (activeFilter) {
            const clRow = document.querySelector(`.cluster-row[data-iso="${activeFilter}"]`);
            if (clRow) clRow.classList.add('active');
          }
          renderFeed(signals);
        });
      }

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe, skip US/null iso, filter to 2025+, sort newest first
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.iso && s.iso !== 'US')
        .filter(s => (s.signal_date || '') >= '2025-01-01')
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        document.getElementById('feed').innerHTML =
          '<div style="color:var(--muted);font-size:12px;padding:16px 0">no signals</div>';
        return;
      }

      // Load all profiles in parallel
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      const clusters = computeClusters(signals);
      renderClusters(clusters, signals);
      renderFeed(signals);
    }

    main();
  </script>
</body>
</html>
