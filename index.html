<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <link rel="stylesheet" href="harpy.css">
</head>
<body>
  <header>
    <span class="wordmark">HARPY</span>
    <span id="updated"></span>
  </header>

  <div class="outer">
    <div id="status">fetching signals…</div>

    <!-- Zone 1: Narratives -->
    <div id="narratives-section">
      <div class="section-label">narratives</div>
      <div class="section-rule"></div>
      <div id="narratives-list"></div>
    </div>

    <!-- Zone 2: Feed -->
    <div id="feed-section">
      <div class="section-label">record</div>
      <div class="section-rule"></div>
      <div id="feed-hdr" style="display:none">
        <span id="feed-label"></span>
        <span id="feed-toggle-btn"></span>
      </div>
      <div id="filter-bar" style="display:none"></div>
      <div id="feed"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="harpy.js"></script>
</body>
</html>
