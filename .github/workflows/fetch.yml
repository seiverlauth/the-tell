name: Fetch Signals

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      PYTHON: arch -arm64 python3
      PIP: arch -arm64 pip3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: $PIP install --upgrade --no-cache-dir --break-system-packages curl_cffi requests beautifulsoup4 pypdf

      - name: Configure git and pull latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Run fetch_dsca.py
        run: $PYTHON scripts/fetch_dsca.py
        continue-on-error: true

      - name: Run fetch_sam.py
        run: $PYTHON scripts/fetch_sam.py
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}

      - name: Run fetch_ofac.py
        run: $PYTHON scripts/fetch_ofac.py
        continue-on-error: true

      - name: Run fetch_fara.py
        run: $PYTHON scripts/fetch_fara.py
        continue-on-error: true

      - name: Run fetch_lda.py
        run: $PYTHON scripts/fetch_lda.py
        continue-on-error: true

      - name: Run fetch_federalregister.py
        run: $PYTHON scripts/fetch_federalregister.py
        continue-on-error: true

      - name: Run fetch_anchor.py
        run: $PYTHON scripts/fetch_anchor.py
        continue-on-error: true

      - name: Run fetch_cftc.py
        run: $PYTHON scripts/fetch_cftc.py
        continue-on-error: true

      - name: Run build_signals.py
        run: $PYTHON scripts/build_signals.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git add data/signals.json data/prose_cache.json data/dsca_signals.json data/dsca_nato.json data/sam_signals.json data/ofac_signals.json data/ofac_known_uids.json data/fara_signals.json data/lda_signals.json data/federalregister_signals.json data/anchor_signals.json data/cftc_signals.json
          git commit -m "update signals [skip ci]" || echo "nothing to commit"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
