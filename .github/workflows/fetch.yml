name: Fetch Signals

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run fetch_signals.py
        run: python scripts/fetch_signals.py

      - name: Commit signals.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          if git diff --cached --quiet; then
            echo "No changes to signals.json, skipping commit."
          else
            git commit -m "update signals [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
