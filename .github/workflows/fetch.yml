name: Fetch Signals

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip3 install --upgrade requests beautifulsoup4

      - name: Configure git and pull latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Run fetch_dsca.py
        run: python3 scripts/fetch_dsca.py
        continue-on-error: true

      - name: Run fetch_sam.py
        run: python3 scripts/fetch_sam.py
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}

      - name: Run fetch_ofac.py
        run: python3 scripts/fetch_ofac.py
        continue-on-error: true

      - name: Run fetch_fara.py
        run: python3 scripts/fetch_fara.py
        continue-on-error: true

      - name: Run fetch_lda.py
        run: python3 scripts/fetch_lda.py
        continue-on-error: true

      - name: Run build_signals.py
        run: python3 scripts/build_signals.py

      - name: Commit updated data
        run: |
          git add data/signals.json data/dsca_signals.json data/dsca_nato.json data/sam_signals.json data/ofac_signals.json data/ofac_known_uids.json data/fara_signals.json data/lda_signals.json
          git commit -m "update signals [skip ci]" || echo "nothing to commit"
          git push origin main --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
